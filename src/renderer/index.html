<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>Brisvia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============ PRIMER ARRANQUE (onboarding + crear billetera + respaldo de semilla) ============ -->
  <div id="setup" class="overlay" hidden>
    <div class="card setup-card">

      <!-- Paso: bienvenida (3 slides) -->
      <section class="step" data-step="welcome">
        <img class="logo lg" src="assets/logo.png" alt="Brisvia">
        <h2 id="onb-title"></h2>
        <p id="onb-text" class="muted"></p>
        <div class="onb-dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span></div>
        <button id="onb-next" class="btn primary block"></button>
      </section>

      <!-- Paso: crear o importar -->
      <section class="step" data-step="choose" hidden>
        <img class="logo lg" src="assets/logo.png" alt="Brisvia">
        <h2 data-i18n="onboarding.choose_t"></h2>
        <p class="muted" data-i18n="onboarding.choose_x"></p>
        <button id="btn-create" class="btn primary block" data-i18n="onboarding.create"></button>
        <button id="btn-import" class="btn ghost block" data-i18n="onboarding.import"></button>
      </section>

      <!-- Paso: mostrar semilla -->
      <section class="step" data-step="seed" hidden>
        <h2 data-i18n="onboarding.seed_t"></h2>
        <p class="muted" data-i18n="onboarding.seed_x"></p>
        <div class="warn" data-i18n="onboarding.seed_warn"></div>
        <ol id="seed-grid" class="seed-grid"></ol>
        <label class="check"><input type="checkbox" id="seed-ack"> <span data-i18n="onboarding.seed_ack"></span></label>
        <button id="seed-next" class="btn primary block" disabled data-i18n="common.continue"></button>
      </section>

      <!-- Paso: verificar respaldo -->
      <section class="step" data-step="verify" hidden>
        <h2 data-i18n="onboarding.verify_t"></h2>
        <p class="muted" data-i18n="onboarding.verify_x"></p>
        <div id="verify-slots" class="verify-slots"></div>
        <div id="verify-bank" class="verify-bank"></div>
        <p id="verify-msg" class="verify-msg" hidden></p>
        <div class="row-gap">
          <button id="verify-back" class="btn ghost" data-i18n="onboarding.verify_back"></button>
          <button id="verify-reset" class="btn ghost" data-i18n="common.retry"></button>
        </div>
      </section>

      <!-- Paso: importar frase -->
      <section class="step" data-step="import" hidden>
        <h2 data-i18n="onboarding.import_t"></h2>
        <p class="muted" data-i18n="onboarding.import_x"></p>
        <ol id="import-grid" class="import-grid"></ol>
        <p id="import-msg" class="verify-msg" hidden></p>
        <div class="row-gap">
          <button id="import-back" class="btn ghost" data-i18n="common.back"></button>
          <button id="import-ok" class="btn primary" data-i18n="onboarding.do_import"></button>
        </div>
      </section>

    </div>
  </div>

  <!-- ============ APP PRINCIPAL ============ -->
  <header class="topbar">
    <div class="brand">
      <img class="logo sm" src="assets/logo.png" alt="Brisvia">
      <span class="brand-name">Brisvia</span>
    </div>
    <nav class="nav" role="tablist">
      <button class="nav-btn active" data-view="wallet" data-i18n="nav.wallet"></button>
      <button class="nav-btn" data-view="mine" data-i18n="nav.mine"></button>
      <button class="nav-btn" data-view="settings" data-i18n="nav.settings"></button>
    </nav>
    <div class="net" data-tip-key="net"><span class="net-dot"></span> <span id="net-label"></span></div>
  </header>

  <!-- Aviso de red de prueba (testnet): monedas sin valor + cuenta regresiva hacia la red principal -->
  <div id="testnet-banner" class="testnet-banner" hidden>
    <span class="tb-text"><strong data-i18n="testnet.tag"></strong> <span data-i18n="testnet.note"></span></span>
    <span id="tb-countdown" class="tb-countdown" hidden></span>
  </div>

  <main class="content">

    <!-- ---- Vista Billetera ---- -->
    <section class="view" data-view="wallet">
      <div class="wallet-left">
        <div class="balance-card">
          <div class="bal-lbl muted small" data-tip-key="balance"><span data-i18n="wallet.balance_available"></span></div>
          <div class="bal-val"><span id="bal-amount">0</span> <span class="bal-unit">BRVA</span></div>
          <div class="bal-incoming-wrap" id="bal-incoming-wrap" hidden>
            <button class="bal-chip mat" id="bd-maturing-row" hidden>
              <span class="bd-dot mat"></span><span data-i18n="wallet.maturing"></span>&nbsp;<strong id="bd-maturing">0</strong>&nbsp;BRVA
            </button>
            <button class="bal-chip inc" id="bd-incoming-row" hidden>
              <span class="bd-dot inc"></span><span data-i18n="wallet.incoming"></span>&nbsp;<strong id="bd-incoming">0</strong>&nbsp;BRVA
            </button>
          </div>
          <p class="bal-explain muted small" id="bal-explain" hidden></p>
          <div class="bal-actions">
            <button id="act-receive" class="btn primary" data-i18n="wallet.receive"></button>
            <button id="act-send" class="btn mineral" data-i18n="wallet.send"></button>
          </div>
          <div class="bal-trust muted small" data-i18n="wallet.trust"></div>
        </div>

        <div class="panel net-panel">
          <div class="panel-head"><h3 data-i18n="net_panel.title"></h3></div>
          <div class="net-rows">
            <div class="nr"><span class="muted" data-tip-key="status" data-i18n="net_panel.status"></span><span id="nr-status"></span></div>
            <div class="nr"><span class="muted" data-tip-key="blocks" data-i18n="net_panel.height"></span><span id="nr-height">—</span></div>
            <div class="nr"><span class="muted" data-tip-key="peers" data-i18n="net_panel.peers"></span><span id="nr-peers">—</span></div>
            <div class="nr"><span class="muted" data-tip-key="difficulty" data-i18n="net_panel.difficulty"></span><span id="nr-diff">—</span></div>
          </div>
        </div>
      </div>

      <div class="panel movimientos">
        <div class="panel-head"><h3 data-i18n="wallet.movements"></h3></div>
        <ul id="history-list" class="history"></ul>
        <div id="history-empty" class="empty">
          <img class="logo empty-logo" src="assets/logo.png" alt="Brisvia">
          <p class="muted"><span data-i18n="wallet.empty"></span><br><span data-i18n="wallet.empty_hint"></span></p>
        </div>
      </div>
    </section>

    <!-- ---- Vista Minar ---- -->
    <section class="view" data-view="mine" hidden>
      <div class="mine-grid">
        <div class="hero">
          <div class="state-line"><span id="state-badge" class="badge off"></span></div>
          <h1 id="hero-title"></h1>
          <p id="hero-sub" class="muted"></p>
          <button id="toggle" class="btn giant primary"></button>
          <div class="intensity">
            <span class="muted small" data-tip-key="intensity" data-i18n="mine.how_much"></span>
            <div class="seg" role="group" data-i18n-attr="aria-label:mine.how_much">
              <button class="seg-btn" data-i="suave" data-i18n="mine.soft"></button>
              <button class="seg-btn active" data-i="equilibrado" data-i18n="mine.balanced"></button>
              <button class="seg-btn" data-i="intenso" data-i18n="mine.intense"></button>
            </div>
          </div>
        </div>
        <aside class="contrib">
          <h3 data-i18n="mine.your_contribution"></h3>
          <div class="metric big" data-tip-key="mine_blocks"><div class="m-val" id="m-blocks">0</div><div class="m-lbl muted" data-i18n="mine.blocks_found"></div></div>
          <div class="metric-row">
            <div class="metric" data-tip-key="mine_speed"><div class="m-val" id="m-speed">0 <span class="unit">H/s</span></div><div class="m-lbl muted" data-i18n="mine.speed"></div></div>
            <div class="metric" data-tip-key="mine_cpu"><div class="m-val" id="m-cpu">0%</div><div class="m-lbl muted" data-i18n="mine.cpu_use"></div></div>
          </div>
          <div class="metric-row">
            <div class="metric" data-tip-key="mine_session"><div class="m-val" id="m-session">0</div><div class="m-lbl muted" data-i18n="mine.session_time"></div></div>
            <div class="metric" data-tip-key="mine_total"><div class="m-val" id="m-total">0</div><div class="m-lbl muted" data-i18n="mine.total_time"></div></div>
          </div>
          <p class="note muted small" data-i18n="mine.note"></p>
        </aside>
      </div>
    </section>

    <!-- ---- Vista Ajustes ---- -->
    <section class="view" data-view="settings" hidden>
      <div class="panel settings-panel">
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.autostart_title"></div><div class="muted small" data-i18n="settings.autostart_sub"></div></div>
          <label class="switch"><input type="checkbox" id="set-autostart"><span class="slider"></span></label>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.tray_title"></div><div class="muted small" data-i18n="settings.tray_sub"></div></div>
          <label class="switch"><input type="checkbox" id="set-tray"><span class="slider"></span></label>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.intensity_title"></div><div class="muted small" data-i18n="settings.intensity_sub"></div></div>
          <div class="seg small-seg" id="set-intensity">
            <button class="seg-btn" data-i="suave" data-i18n="mine.soft"></button>
            <button class="seg-btn active" data-i="equilibrado" data-i18n="mine.balanced"></button>
            <button class="seg-btn" data-i="intenso" data-i18n="mine.intense"></button>
          </div>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.language_title"></div><div class="muted small" data-i18n="settings.language_sub"></div></div>
          <div class="seg small-seg" id="set-language">
            <button class="seg-btn" data-lang="es">Español</button>
            <button class="seg-btn" data-lang="en">English</button>
          </div>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.security_title"></div><div class="muted small" data-i18n="settings.security_sub"></div></div>
          <button id="set-security" class="btn ghost" data-i18n="common.open"></button>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.network_title"></div><div class="muted small" data-i18n="settings.network_sub"></div></div>
          <div class="muted" id="set-netinfo" data-i18n="settings.network_value"></div>
        </div>
      </div>

      <div class="panel community">
        <div class="panel-head"><h3 data-i18n="settings.community"></h3></div>
        <div class="social-grid">
          <button class="social" data-url="https://brisvia.com"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg><span>brisvia.com</span></button>
          <button class="social" data-url="https://x.com/brisviacoin"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg><span>@brisviacoin</span></button>
          <button class="social" data-url="https://instagram.com/brisviacoin"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163C8.741 0 8.333.015 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.015 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg><span>Instagram</span></button>

        </div>
      </div>
      <p class="foot-note muted small"><span data-i18n="settings.footnote"></span> <span id="ver-label">v0.1.0</span></p>
    </section>
  </main>

  <!-- ============ MODALES ============ -->
  <div id="modal-receive" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="receive.title"></h2>
      <p class="muted" data-i18n="receive.sub"></p>
      <div id="qr" class="qr" aria-hidden="true"></div>
      <div class="addr-box"><code id="recv-addr"></code></div>
      <div class="row-gap">
        <button id="recv-copy" class="btn primary" data-i18n="receive.copy_addr"></button>
        <button id="recv-new" class="btn ghost" data-i18n="receive.new_addr"></button>
      </div>
    </div>
  </div>

  <div id="modal-send" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="send.title"></h2>
      <label class="field"><span class="muted small" data-i18n="send.to"></span>
        <input id="send-addr" type="text" placeholder="brv1q…"></label>
      <label class="field"><span class="muted small" data-i18n="send.amount"></span>
        <input id="send-amount" type="number" min="0" step="0.00000001" placeholder="0.00"></label>
      <p id="send-msg" class="verify-msg" hidden></p>
      <div class="row-gap">
        <button data-close class="btn ghost" data-i18n="send.cancel"></button>
        <button id="send-go" class="btn mineral" data-i18n="send.go"></button>
      </div>
    </div>
  </div>

  <div id="modal-seed" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="seedview.title"></h2>
      <div class="warn" data-i18n="seedview.warn"></div>
      <ol id="seed-grid-view" class="seed-grid"></ol>
      <button data-close class="btn primary block" data-i18n="seedview.ok"></button>
    </div>
  </div>

  <!-- Detalle de un movimiento -->
  <div id="modal-txdetail" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="tx.title"></h2>
      <div class="detail-rows" id="txd-rows"></div>
    </div>
  </div>

  <!-- Seguridad y respaldo -->
  <div id="modal-security" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="security.title"></h2>
      <p class="muted small" data-i18n="security.intro"></p>
      <div class="warn" data-i18n="security.warn"></div>
      <div class="sec-actions">
        <button id="sec-view" class="btn primary block" data-i18n="security.view_btn"></button>
        <button id="sec-verify" class="btn ghost block" data-i18n="security.verify_btn"></button>
      </div>
    </div>
  </div>

  <!-- Verificar respaldo (escribir las 12 palabras) -->
  <div id="modal-verify-backup" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="security.verify_t"></h2>
      <p class="muted small" data-i18n="security.verify_x"></p>
      <ol id="vb-grid" class="import-grid"></ol>
      <p id="vb-msg" class="verify-msg" hidden></p>
      <div class="row-gap">
        <button data-close class="btn ghost" data-i18n="common.close"></button>
        <button id="vb-check" class="btn primary" data-i18n="security.verify_do"></button>
      </div>
    </div>
  </div>

  <script src="locales.js"></script>
