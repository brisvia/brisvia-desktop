<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>Brisvia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============ FIRST RUN (onboarding + create wallet + seed backup) ============ -->
  <div id="setup" class="overlay" hidden>
    <div class="card setup-card">

      <!-- Step: welcome (3 slides) -->
      <section class="step" data-step="welcome">
        <img class="logo lg" src="assets/logo.png" alt="Brisvia">
        <h2 id="onb-title"></h2>
        <p id="onb-text" class="muted"></p>
        <div class="onb-dots"><span class="dot on"></span><span class="dot"></span><span class="dot"></span></div>
        <button id="onb-next" class="btn primary block"></button>
      </section>

      <!-- Step: create or import -->
      <section class="step" data-step="choose" hidden>
        <img class="logo lg" src="assets/logo.png" alt="Brisvia">
        <h2 data-i18n="onboarding.choose_t"></h2>
        <p class="muted" data-i18n="onboarding.choose_x"></p>
        <button id="btn-create" class="btn primary block" data-i18n="onboarding.create"></button>
        <button id="btn-import" class="btn ghost block" data-i18n="onboarding.import"></button>
      </section>

      <!-- Step: choose password (for create or import) -->
      <section class="step" data-step="pass" hidden>
        <h2 data-i18n="onboarding.pass_t"></h2>
        <p class="muted" data-i18n="onboarding.pass_x"></p>
        <label class="field"><span class="muted small" data-i18n="onboarding.pass_label"></span>
          <input id="pass-1" type="password" autocomplete="new-password" spellcheck="false"></label>
        <div id="pass-meter" class="pass-meter"><i></i></div>
        <label class="field"><span class="muted small" data-i18n="onboarding.pass_confirm"></span>
          <input id="pass-2" type="password" autocomplete="new-password" spellcheck="false"></label>
        <label class="check"><input type="checkbox" id="pass-show"> <span data-i18n="onboarding.pass_show"></span></label>
        <div class="warn" data-i18n="onboarding.pass_warn"></div>
        <p id="pass-msg" class="verify-msg" hidden></p>
        <div class="row-gap">
          <button id="pass-back" class="btn ghost" data-i18n="common.back"></button>
          <button id="pass-next" class="btn primary" data-i18n="common.continue"></button>
        </div>
      </section>

      <!-- Step: show seed -->
      <section class="step" data-step="seed" hidden>
        <h2 data-i18n="onboarding.seed_t"></h2>
        <p class="muted" data-i18n="onboarding.seed_x"></p>
        <div class="warn" data-i18n="onboarding.seed_warn"></div>
        <ol id="seed-grid" class="seed-grid"></ol>
        <label class="check"><input type="checkbox" id="seed-ack"> <span data-i18n="onboarding.seed_ack"></span></label>
        <button id="seed-next" class="btn primary block" disabled data-i18n="common.continue"></button>
      </section>

      <!-- Step: verify backup -->
      <section class="step" data-step="verify" hidden>
        <h2 data-i18n="onboarding.verify_t"></h2>
        <p class="muted" data-i18n="onboarding.verify_x"></p>
        <div id="verify-slots" class="verify-slots"></div>
        <div id="verify-bank" class="verify-bank"></div>
        <p id="verify-msg" class="verify-msg" hidden></p>
        <div class="row-gap">
          <button id="verify-back" class="btn ghost" data-i18n="onboarding.verify_back"></button>
          <button id="verify-reset" class="btn ghost" data-i18n="common.retry"></button>
        </div>
      </section>

      <!-- Step: import phrase -->
      <section class="step" data-step="import" hidden>
        <h2 data-i18n="onboarding.import_t"></h2>
        <p class="muted" data-i18n="onboarding.import_x"></p>
        <ol id="import-grid" class="import-grid"></ol>
        <p id="import-msg" class="verify-msg" hidden></p>
        <div class="row-gap">
          <button id="import-back" class="btn ghost" data-i18n="common.back"></button>
          <button id="import-ok" class="btn primary" data-i18n="onboarding.do_import"></button>
        </div>
      </section>

    </div>
  </div>

  <!-- ============ MAIN APP ============ -->
  <header class="topbar">
    <div class="brand">
      <img class="logo sm" src="assets/logo.png" alt="Brisvia">
      <span class="brand-name">Brisvia</span>
      <span class="ver-chip" id="ver-chip"></span>
    </div>
    <nav class="nav" role="tablist">
      <button class="nav-btn active" data-view="wallet" data-i18n="nav.wallet"></button>
      <button class="nav-btn" data-view="mine" data-i18n="nav.mine"></button>
      <button class="nav-btn" data-view="achievements" data-i18n="nav.achievements"></button>
      <button class="nav-btn" data-view="settings" data-i18n="nav.settings"></button>
    </nav>
    <div class="topbar-right">
      <!-- Social links: visible from any tab. Small icons; the name appears on hover. -->
      <div class="header-social" id="header-social">
        <button class="hsocial" data-url="https://brisvia.com" data-name="brisvia.com" aria-label="brisvia.com"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></button>
        <button class="hsocial" data-url="https://x.com/brisviacoin" data-name="X · @brisviacoin" aria-label="X @brisviacoin"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></button>
        <button class="hsocial" data-url="https://instagram.com/brisviacoin" data-name="Instagram" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163C8.741 0 8.333.015 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.015 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg></button>
        <button class="hsocial" data-url="https://t.me/brisvia" data-name="Telegram" aria-label="Telegram"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg></button>
        <button class="hsocial" data-url="https://discord.gg/ZF4MExMJn4" data-name="Discord" aria-label="Discord"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189z"/></svg></button>
      </div>
      <div class="net" data-tip-key="net"><span class="net-dot"></span> <span id="net-label"></span></div>
    </div>
  </header>

  <!-- Test network (testnet) notice: no reward + until Jul 14 + the wallet also works on mainnet + countdown to real mining (Aug 1) -->
  <div id="testnet-banner" class="testnet-banner" hidden>
    <div class="tb-main">
      <strong data-i18n="testnet.tag"></strong>
      <span data-i18n="testnet.note"></span>
      <span class="tb-until" data-i18n="testnet.until"></span>
    </div>
    <div class="tb-sub">
      <span class="tb-wallet" data-i18n="testnet.wallet_note"></span>
      <span id="tb-countdown" class="tb-countdown" hidden></span>
    </div>
  </div>

  <main class="content">

    <!-- ---- Wallet view ---- -->
    <section class="view" data-view="wallet">
      <div class="wallet-left">
        <div class="balance-card">
          <div class="bal-lbl muted small" data-tip-key="balance"><span data-i18n="wallet.balance_available"></span></div>
          <div class="bal-val"><span id="bal-amount">0</span> <span class="bal-unit">BRVA</span></div>
          <div class="bal-incoming-wrap" id="bal-incoming-wrap" hidden>
            <button class="bal-chip mat" id="bd-maturing-row" hidden>
              <span class="bd-dot mat"></span><span data-i18n="wallet.maturing"></span>&nbsp;<strong id="bd-maturing">0</strong>&nbsp;BRVA
            </button>
            <button class="bal-chip inc" id="bd-incoming-row" hidden>
              <span class="bd-dot inc"></span><span data-i18n="wallet.incoming"></span>&nbsp;<strong id="bd-incoming">0</strong>&nbsp;BRVA
            </button>
          </div>
          <p class="bal-explain muted small" id="bal-explain" hidden></p>
          <div class="bal-actions">
            <button id="act-receive" class="btn primary" data-i18n="wallet.receive"></button>
            <button id="act-send" class="btn mineral" data-i18n="wallet.send"></button>
          </div>
          <div class="bal-trust muted small" data-i18n="wallet.trust"></div>
        </div>

        <div class="panel net-panel">
          <div class="panel-head"><h3 data-i18n="net_panel.title"></h3></div>
          <div class="net-rows">
            <div class="nr"><span class="muted" data-tip-key="status" data-i18n="net_panel.status"></span><span id="nr-status"></span></div>
            <div class="nr"><span class="muted" data-tip-key="mining_status" data-i18n="net_panel.mining"></span><span id="nr-mining">—</span></div>
            <div class="nr"><span class="muted" data-tip-key="blocks" data-i18n="net_panel.height"></span><span id="nr-height">—</span></div>
            <div class="nr"><span class="muted" data-tip-key="peers" data-i18n="net_panel.peers"></span><span id="nr-peers">—</span></div>
            <div class="nr"><span class="muted" data-tip-key="difficulty" data-i18n="net_panel.difficulty"></span><span id="nr-diff">—</span></div>
          </div>
        </div>
      </div>

      <div class="panel movimientos">
        <div class="panel-head"><h3 data-i18n="wallet.movements"></h3></div>
        <ul id="history-list" class="history"></ul>
        <div id="history-empty" class="empty">
          <img class="logo empty-logo" src="assets/logo.png" alt="Brisvia">
          <p class="muted"><span data-i18n="wallet.empty"></span><br><span data-i18n="wallet.empty_hint"></span></p>
        </div>
        <nav id="history-pager" class="pager" data-i18n-attr="aria-label:wallet.pager" hidden></nav>
      </div>
    </section>

    <!-- ---- Mine view ---- -->
    <section class="view" data-view="mine" hidden>
      <div class="mine-grid">
        <div class="hero">
          <div class="state-line"><span id="state-badge" class="badge off"></span></div>
          <h1 id="hero-title"></h1>
          <p id="hero-sub" class="muted"></p>
          <button id="toggle" class="btn giant primary"></button>
          <div class="intensity">
            <span class="muted small" data-tip-key="intensity" data-i18n="mine.how_much"></span>
            <div class="seg" role="group" data-i18n-attr="aria-label:mine.how_much">
              <button class="seg-btn" data-pct="25" data-i18n="mine.soft"></button>
              <button class="seg-btn active" data-pct="50" data-i18n="mine.balanced"></button>
              <button class="seg-btn" data-pct="75" data-i18n="mine.high"></button>
              <button class="seg-btn" data-pct="100" data-i18n="mine.max"></button>
            </div>
            <div class="pow-slider">
              <input type="range" id="pow-range" min="1" max="100" value="50" step="1" data-i18n-attr="aria-label:mine.how_much">
              <span id="pow-val" class="pow-val">50%</span>
            </div>
          </div>
        </div>
        <aside class="contrib">
          <h3 data-i18n="mine.your_contribution"></h3>
          <p class="contrib-sub muted small" data-i18n="mine.note"></p>
          <div class="metric big" data-tip-key="mine_blocks"><div class="m-val" id="m-blocks">0</div><div class="m-lbl muted" data-i18n="mine.blocks_found"></div></div>
          <p class="stale-line muted small" id="stale-line" hidden><strong id="m-stale">0</strong> <span data-i18n="mine.stale_blocks"></span> · <span data-i18n="mine.stale_hint"></span></p>
          <div class="metric-row">
            <div class="metric" data-tip-key="mine_speed"><div class="m-val" id="m-speed">0 <span class="unit">H/s</span></div><div class="m-lbl muted" data-i18n="mine.speed"></div></div>
            <div class="metric" data-tip-key="mine_cpu"><div class="m-val" id="m-cpu">0%</div><div class="m-lbl muted" data-i18n="mine.cpu_use"></div></div>
          </div>
          <div class="metric-row">
            <div class="metric" data-tip-key="mine_session"><div class="m-val" id="m-session">0</div><div class="m-lbl muted" data-i18n="mine.session_time"></div></div>
            <div class="metric" data-tip-key="mine_total"><div class="m-val" id="m-total">0</div><div class="m-lbl muted" data-i18n="mine.total_time"></div></div>
          </div>
        </aside>
      </div>
    </section>

    <!-- ---- Achievements view ---- -->
    <section class="view" data-view="achievements" hidden>
      <p class="ach-sub muted small" data-i18n="ach.subtitle"></p>
      <div id="ach-families" class="ach-families"></div>
      <div id="ach-empty" class="empty" hidden>
        <img class="logo empty-logo" src="assets/logo.png" alt="Brisvia">
        <p class="muted" data-i18n="ach.empty"></p>
      </div>
    </section>

    <!-- ---- Settings view ---- -->
    <section class="view" data-view="settings" hidden>
      <div class="panel settings-panel">
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.autostart_title"></div><div class="muted small" data-i18n="settings.autostart_sub"></div></div>
          <label class="switch"><input type="checkbox" id="set-autostart"><span class="slider"></span></label>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.tray_title"></div><div class="muted small" data-i18n="settings.tray_sub"></div></div>
          <label class="switch"><input type="checkbox" id="set-tray"><span class="slider"></span></label>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.intensity_title"></div><div class="muted small" data-i18n="settings.intensity_sub"></div></div>
          <div class="seg small-seg" id="set-intensity">
            <button class="seg-btn" data-pct="25" data-i18n="mine.soft"></button>
            <button class="seg-btn active" data-pct="50" data-i18n="mine.balanced"></button>
            <button class="seg-btn" data-pct="75" data-i18n="mine.high"></button>
            <button class="seg-btn" data-pct="100" data-i18n="mine.max"></button>
          </div>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.language_title"></div><div class="muted small" data-i18n="settings.language_sub"></div></div>
          <div class="seg small-seg" id="set-language">
            <button class="seg-btn" data-lang="es">Español</button>
            <button class="seg-btn" data-lang="en">English</button>
          </div>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.security_title"></div><div class="muted small" data-i18n="settings.security_sub"></div></div>
          <button id="set-security" class="btn ghost" data-i18n="common.open"></button>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.network_title"></div><div class="muted small" data-i18n="settings.network_sub"></div></div>
          <div class="muted" id="set-netinfo" data-i18n="settings.network_value"></div>
        </div>
        <div class="set-row">
          <div><div class="set-title" data-i18n="settings.update_title"></div><div class="muted small" data-i18n="settings.update_sub"></div></div>
          <button id="set-update" class="btn ghost" data-i18n="update.check"></button>
        </div>
      </div>

      <p class="foot-note muted small"><span data-i18n="settings.footnote"></span> <span id="ver-label">v0.4.0</span></p>
    </section>
  </main>

  <!-- ============ MODALS ============ -->
  <div id="modal-receive" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="receive.title"></h2>
      <p class="muted" data-i18n="receive.sub"></p>
      <div id="qr" class="qr" aria-hidden="true"></div>
      <div class="addr-box"><code id="recv-addr"></code></div>
      <div class="row-gap">
        <button id="recv-copy" class="btn primary" data-i18n="receive.copy_addr"></button>
        <button id="recv-new" class="btn ghost" data-i18n="receive.new_addr"></button>
      </div>
      <button id="recv-history-toggle" class="link small" data-i18n="receive.history"></button>
      <ol id="recv-history" class="addr-history" hidden></ol>
    </div>
  </div>

  <div id="modal-send" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="send.title"></h2>
      <label class="field"><span class="muted small" data-i18n="send.to"></span>
        <input id="send-addr" type="text" placeholder="brv1q…" autocomplete="off" spellcheck="false"></label>
      <div class="send-avail">
        <span class="muted small"><span data-i18n="send.available"></span> <strong id="send-avail">0</strong> BRVA</span>
        <button type="button" id="send-max" class="link small" data-i18n="send.max"></button>
      </div>
      <label class="field"><span class="muted small" data-i18n="send.amount"></span>
        <input id="send-amount" type="text" inputmode="decimal" autocomplete="off" placeholder="0,00"></label>
      <p class="send-net muted small" data-i18n="send.testnet_note"></p>
      <label class="field" id="send-pass-field"><span class="muted small" data-i18n="send.password"></span>
        <input id="send-pass" type="password" autocomplete="current-password" placeholder="••••••••"></label>
      <p id="send-msg" class="verify-msg" hidden></p>
      <div class="row-gap">
        <button data-close class="btn ghost" data-i18n="send.cancel"></button>
        <button id="send-go" class="btn mineral" data-i18n="send.go"></button>
      </div>
    </div>
  </div>

  <div id="modal-seed" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="seedview.title"></h2>
      <div class="warn" data-i18n="seedview.warn"></div>
      <ol id="seed-grid-view" class="seed-grid"></ol>
      <button data-close class="btn primary block" data-i18n="seedview.ok"></button>
    </div>
  </div>

  <!-- Movement detail -->
  <div id="modal-txdetail" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="tx.title"></h2>
      <div class="detail-rows" id="txd-rows"></div>
    </div>
  </div>

  <!-- Security and backup -->
  <div id="modal-security" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="security.title"></h2>
      <p class="muted small" data-i18n="security.intro"></p>
      <div class="warn" data-i18n="security.warn"></div>
      <div class="sec-actions">
        <button id="sec-verify" class="btn primary block" data-i18n="security.verify_btn"></button>
        <button id="sec-reveal" class="btn ghost block" data-i18n="security.reveal_btn"></button>
      </div>
    </div>
  </div>

  <!-- Show phrase (advanced): asks for the wallet password -->
  <div id="modal-reveal" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="security.reveal_t"></h2>
      <p class="muted small" data-i18n="security.reveal_x"></p>
      <div class="warn" data-i18n="security.reveal_warn"></div>
      <label class="field"><span class="muted small" data-i18n="security.reveal_pass"></span>
        <input id="reveal-pass" type="password" autocomplete="current-password"></label>
      <p id="reveal-msg" class="verify-msg" hidden></p>
      <div class="row-gap">
        <button data-close class="btn ghost" data-i18n="common.close"></button>
        <button id="reveal-go" class="btn primary" data-i18n="security.reveal_do"></button>
      </div>
    </div>
  </div>

  <!-- Protect an old wallet (no password) when opening it -->
  <div id="modal-protect" class="overlay" hidden>
    <div class="card modal">
      <h2 data-i18n="protect.title"></h2>
      <p class="muted small" data-i18n="protect.intro"></p>
      <label class="field"><span class="muted small" data-i18n="onboarding.pass_label"></span>
        <input id="protect-1" type="password" autocomplete="new-password" spellcheck="false"></label>
      <div id="protect-meter" class="pass-meter"><i></i></div>
      <label class="field"><span class="muted small" data-i18n="onboarding.pass_confirm"></span>
        <input id="protect-2" type="password" autocomplete="new-password" spellcheck="false"></label>
      <div class="warn" data-i18n="onboarding.pass_warn"></div>
      <p id="protect-msg" class="verify-msg" hidden></p>
      <div class="row-gap">
        <button data-close class="btn ghost" data-i18n="protect.later"></button>
        <button id="protect-go" class="btn primary" data-i18n="protect.do"></button>
      </div>
    </div>
  </div>

  <!-- Verify backup (type the 12 words) -->
  <div id="modal-verify-backup" class="overlay" hidden>
    <div class="card modal">
      <button class="modal-x" data-close data-i18n-attr="aria-label:common.close">×</button>
      <h2 data-i18n="security.verify_t"></h2>
      <p class="muted small" data-i18n="security.verify_x"></p>
      <ol id="vb-grid" class="import-grid"></ol>
      <p id="vb-msg" class="verify-msg" hidden></p>
      <div class="row-gap">
        <button data-close class="btn ghost" data-i18n="common.close"></button>
        <button id="vb-check" class="btn primary" data-i18n="security.verify_do"></button>
      </div>
    </div>
  </div>

  <!-- Update available: pop-up when the app opens. OK updates; Later dismisses it. -->
  <div id="modal-update" class="overlay" hidden>
    <div class="card modal">
      <h2 data-i18n="update.available_tag"></h2>
      <p class="upd-ver" id="upd-ver"></p>
      <p class="muted" data-i18n="update.modal_text"></p>
      <div class="row-gap">
        <button id="upd-later" class="btn ghost" data-i18n="update.later"></button>
        <button id="upd-ok" class="btn primary" data-i18n="update.install_now"></button>
      </div>
    </div>
  </div>

  <script src="locales.js"></script>
  <script src="i18n.js"></script>
  <script src="tauri-bridge.js"></script>
  <script src="app.js"></script>
</body>
</html>
