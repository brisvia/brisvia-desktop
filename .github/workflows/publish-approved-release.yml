name: Publish approved release

# The only path by which 1.0.6 can reach people.
#
# IT DOES NOT TRUST THE .BAT. The .bat runs on Fernando's machine and anyone with access to that machine
# could edit it. This workflow redoes ALL of the identity checks on its own. The .bat is the hand that
# turns the key; this is the lock.
#
# Order, and why that order:
#   1) verify everything BEFORE publishing. Publishing is irreversible.
#   2) publish the EXACT draft. Do not rebuild, do not replace assets: the approved bytes are the ones that
#      go out. Rebuilding would produce different bytes than the ones tested, and then the tests would not
#      be valid for what people download.
#   3) after publishing, download everything AGAIN and without credentials, like a stranger, and compare
#      once more. Publishing changes the URL: the one tested was the draft's.
#   4) only then activate latest.json.
#
# If something fails AFTER publishing: latest.json is NOT activated and the workflow stays red. A published
# release that nobody receives through the updater is a small problem. An updater that pushes a broken
# version to every machine is a big problem.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Exact version (e.g. 1.0.6)"
        required: true
      tag:
        description: "Immutable tag of the approved candidate (e.g. v1.0.6-rc5)"
        required: true
      sha:
        description: "Full SHA of the approved commit (40 characters)"
        required: true
      manifest_sha256:
        description: "SHA-256 of release-go-v1.0.6.json"
        required: true
      approval_sha256:
        description: "SHA-256 of owner-approval-v1.0.6.json"
        required: true

permissions:
  contents: write

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo at the approved point
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha }}
          fetch-depth: 0

      - name: Identity — is the requested SHA EXACTLY the approved tag's?
        run: |
          set -euo pipefail
          echo "::group::identity"
          TAG_SHA=$(git rev-list -n 1 "${{ inputs.tag }}")
          echo "  tag ${{ inputs.tag }} -> $TAG_SHA"
          echo "  requested sha        -> ${{ inputs.sha }}"
          [ "$TAG_SHA" = "${{ inputs.sha }}" ] || {
            echo "REJECTED: the requested SHA is not the approved tag's."; exit 1; }
          # The tag has to actually exist and be immutable: if someone moved it, the SHA does not match.
          echo "  version in tauri.conf.json: $(python3 -c "import json;print(json.load(open('src-tauri/tauri.conf.json'))['version'])")"
          python3 - <<'PY'
          import json, os, sys
          v = json.load(open("src-tauri/tauri.conf.json"))["version"]
          if v != os.environ["V"]:
              sys.exit(f"REJECTED: the code says {v} and publishing {os.environ['V']} was requested")
          print(f"  OK: the tag's code says {v}")
          PY
          echo "::endgroup::"
        env:
          V: ${{ inputs.version }}

      - name: does main contain the candidate?
        run: |
          set -euo pipefail
          # An open coin has to be rebuildable from its public repo. If main does not have the candidate's
          # tree, what we publish is not what anyone can compile.
          git fetch -q origin main
          MT=$(git rev-parse origin/main^{tree})
          CT=$(git rev-parse "${{ inputs.sha }}^{tree}")
          echo "  main's tree:      $MT"
          echo "  candidate's tree: $CT"
          [ "$MT" = "$CT" ] || {
            echo "REJECTED: main does NOT have the candidate's tree. It would not be reproducible."; exit 1; }
          echo "  OK: main is reproducible against the candidate"

      - name: The GO manifest was not touched, and says GO
        run: |
          set -euo pipefail
          M=release-go-${{ inputs.version && format('v{0}', inputs.version) }}.json
          [ -f "$M" ] || { echo "REJECTED: $M is missing from the repo"; exit 1; }
          H=$(sha256sum "$M" | cut -d' ' -f1)
          echo "  $M -> $H"
          [ "$H" = "${{ inputs.manifest_sha256 }}" ] || {
            echo "REJECTED: the manifest changed after it was approved."
            echo "  expected: ${{ inputs.manifest_sha256 }}"; exit 1; }
          python3 - "$M" <<'PY'
          import json, sys
          d = json.load(open(sys.argv[1]))
          if d.get("status") != "GO":
              sys.exit(f"REJECTED: the manifest says status={d.get('status')!r}, not GO")
          faltan = [k for k in ("version", "tag", "commit_sha", "tree_sha", "assets", "gates",
                                "repo", "generated_utc") if k not in d]
          if faltan:
              sys.exit(f"REJECTED: the manifest is missing fields: {faltan}")
          malas = [g for g, r in d["gates"].items() if r != "PASS"]
          if malas:
              sys.exit(f"REJECTED: there are gates that did not pass: {malas}")
          print(f"  OK: GO, {len(d['assets'])} assets, {len(d['gates'])} gates at PASS")
          PY

      - name: Is the release still a DRAFT and not published before? (idempotency)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Idempotent: if it is already published, this STOPS and explains. It does not republish or overwrite anything.
          D=$(gh api repos/${{ github.repository }}/releases --jq \
              '.[] | select(.tag_name=="v${{ inputs.version }}") | "\(.id) \(.draft)"')
          [ -n "$D" ] || { echo "REJECTED: release v${{ inputs.version }} does not exist"; exit 1; }
          ID=$(echo "$D" | cut -d' ' -f1); DR=$(echo "$D" | cut -d' ' -f2)
          echo "  release id=$ID draft=$DR"
          if [ "$DR" != "true" ]; then
            echo "STOP: v${{ inputs.version }} IS ALREADY PUBLISHED. There is nothing to do."
            echo "      This is not an error: it is the workflow refusing to repeat an operation."
            exit 1
          fi
          echo "RELEASE_ID=$ID" >> "$GITHUB_ENV"

      - name: does latest.json still offer 1.0.5?
        run: |
          set -euo pipefail
          # If it was already altered, someone published through another path and this workflow must not continue.
          C=$(curl -s -o /tmp/lj -w "%{http_code}" https://brisvia.com/latest.json || echo 000)
          echo "  https://brisvia.com/latest.json -> $C"
          if [ "$C" = "200" ]; then
            V=$(python3 -c "import json;print(json.load(open('/tmp/lj')).get('version','?'))")
            echo "  version it offers: $V"
            [ "$V" != "${{ inputs.version }}" ] || {
              echo "STOP: latest.json ALREADY offers ${{ inputs.version }}."; exit 1; }
          else
            echo "  (not published yet: correct for this moment)"
          fi

      - name: The draft's assets are EXACTLY the approved ones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${{ github.repository }}/releases/$RELEASE_ID/assets" > /tmp/assets.json
          python3 - <<'PY'
          import hashlib, json, os, subprocess, sys, urllib.request
          man = json.load(open(f"release-go-v{os.environ['V']}.json"))
          reales = {a["name"]: a for a in json.load(open("/tmp/assets.json"))}
          esperados = {a["name"]: a for a in man["assets"]}
          mal = []
          for f in sorted(set(esperados) - set(reales)):
              mal.append(f"MISSING from the draft: {f}")
          for f in sorted(set(reales) - set(esperados)):
              mal.append(f"EXTRA in the draft (nobody approved it): {f}")
          tok = os.environ["GH_TOKEN"]
          for n, e in sorted(esperados.items()):
              if n not in reales:
                  continue
              r = reales[n]
              if r["size"] != e["size"]:
                  mal.append(f"{n}: weighs {r['size']} and {e['size']} was approved")
                  continue
              req = urllib.request.Request(r["url"], headers={
                  "Accept": "application/octet-stream", "Authorization": f"Bearer {tok}"})
              h = hashlib.sha256()
              with urllib.request.urlopen(req, timeout=900) as f:
                  while (b := f.read(1 << 20)):
                      h.update(b)
              if h.hexdigest() != e["sha256"]:
                  mal.append(f"{n}: SHA-256 different from the approved one\n"
                             f"      approved: {e['sha256']}\n      now:      {h.hexdigest()}")
              else:
                  print(f"  ok  {n}  {r['size']:,}")
          if mal:
              print("\nREJECTED: the draft is not the one that was approved:")
              for m in mal:
                  print("  -", m)
              sys.exit(1)
          print(f"\n  OK: the {len(esperados)} approved assets, none extra, hash by hash.")
          PY
        env:
          V: ${{ inputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: PUBLISH the approved draft (irreversible)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Exactly these bytes. No rebuild, no asset replacement: if it were rebuilt, what people download
          # would not be what was tested.
          echo "  publishing release id=$RELEASE_ID with commit ${{ inputs.sha }}"
          gh api -X PATCH "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -f draft=false -f target_commitish="${{ inputs.sha }}" -f make_latest=true > /dev/null
          echo "  PUBLISHED"

      - name: Download everything AGAIN, as a stranger, and compare
        run: |
          set -euo pipefail
          # No credentials: publishing changes the download URL. The one verified was the draft's.
          # This proves what any ordinary person receives.
          python3 - <<'PY'
          import hashlib, json, os, sys, urllib.request
          man = json.load(open(f"release-go-v{os.environ['V']}.json"))
          base = f"https://github.com/{os.environ['R']}/releases/download/v{os.environ['V']}"
          mal = []
          for a in sorted(man["assets"], key=lambda x: x["name"]):
              url = f"{base}/{urllib.parse.quote(a['name'])}"
              try:
                  h, n = hashlib.sha256(), 0
                  with urllib.request.urlopen(url, timeout=900) as f:
                      while (b := f.read(1 << 20)):
                          h.update(b); n += len(b)
              except Exception as e:
                  mal.append(f"{a['name']}: cannot be downloaded publicly ({e})"); continue
              if n != a["size"] or h.hexdigest() != a["sha256"]:
                  mal.append(f"{a['name']}: what is published is NOT what was approved ({n} bytes, {h.hexdigest()})")
              else:
                  print(f"  ok  {a['name']}  {n:,}")
          if mal:
              print("\nFAILED AFTER PUBLISHING. latest.json is NOT activated:")
              for m in mal: print("  -", m)
              print("\nNothing is rebuilt or replaced: that would hide the evidence.")
              sys.exit(1)
          print("\n  OK: what anyone downloads is byte for byte what was approved.")
          PY
        env:
          V: ${{ inputs.version }}
          R: ${{ github.repository }}

      - name: latest.json — PENDING, not activated here
        run: |
          echo "=================================================================="
          echo " v${{ inputs.version }} PUBLISHED and verified in public."
          echo ""
          echo " latest.json still offers 1.0.5 ON PURPOSE."
          echo " Activating it pushes the version to EVERY installed machine at once:"
          echo " it is the widest-reaching operation in the release and the most expensive to undo."
          echo " It is done after the real canary from a 1.0.5, not before."
          echo "=================================================================="
