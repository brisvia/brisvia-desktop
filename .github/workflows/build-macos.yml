name: Build macOS

# Builds the whole app for macOS (Apple Silicon) on GitHub's free macOS runners:
# RandomX -> bitcoind node -> Rust miner -> Tauri app (.dmg) -> attach to the release.
# Triggered manually from the Actions tab.
on:
  workflow_dispatch:

jobs:
  macos-arm64:
    runs-on: macos-14 # Apple Silicon (arm64)
    permissions:
      contents: write # needed to attach the .dmg to the release
    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4

      # Candado de version (bug real: tauri.conf decia 1.0.2 y Cargo.toml 1.0.0 -> la app mostraba la vieja).
      # Si no coinciden, el build FALLA aca y no se publica nada desincronizado.
      - name: Guard - version de tauri.conf.json y Cargo.toml deben coincidir
        shell: bash
        env:
          GITHUB_WORKFLOW_FILE: .github/workflows/build-macos.yml
        run: |
          TC=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/tauri.conf.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          CG=$(grep -oE '^version = "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          # El tag al que se adjunta el release tiene que ser el MISMO numero: si no, el actualizador
          # le ofrece a la gente una version que no coincide con la que trae el instalador.
          TAG=$(grep -oE 'tag_name: v[0-9]+\.[0-9]+\.[0-9]+' "$GITHUB_WORKFLOW_FILE" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tauri.conf.json = $TC | Cargo.toml = $CG | tag del release = $TAG"
          if [ "$TC" != "$CG" ]; then echo "FALLO: versiones desincronizadas ($TC vs $CG)"; exit 1; fi
          if [ "$TAG" != "$TC" ]; then echo "FALLO: el tag del release (v$TAG) no coincide con la version ($TC)"; exit 1; fi
          echo "OK: version y tag sincronizados ($TC)"

      # PRODUCT guards (not logic). They exist because of real bugs found in a two-minute manual pass and
      # an automated audit did not catch: a Spanish text with the language in English, and a raw error
      # del nodo en pantalla. Miran el producto tal como lo ve la gente, no el codigo por separado.
      - name: Candado - textos (idiomas completos, sin mezclas, sin texto fijo en el HTML)
        shell: bash
        run: python tools/check_textos.py

      - name: Candado - errores (todo error del programa llega traducido en ES y EN)
        shell: bash
        run: python tools/check_error_contract.py

      - name: Checkout core (with the RandomX submodule)
        uses: actions/checkout@v4
        with:
          repository: brisvia/brisvia
          submodules: recursive
          path: core

      - name: Install build dependencies
        run: brew install cmake boost libevent sqlite

      - name: Build RandomX (static lib)
        run: |
          cmake -S core/src/randomx -B core/src/randomx/build -DCMAKE_BUILD_TYPE=Release -DARCH=native
          cmake --build core/src/randomx/build -j3

      - name: Build bitcoind and bitcoin-cli
        run: |
          cd core
          cmake -B build \
            -DENABLE_IPC=OFF -DBUILD_TESTS=OFF -DBUILD_GUI=OFF -DWITH_ZMQ=OFF -DBUILD_BENCH=OFF \
            -DBRISVIA_RANDOMX_LIB="$PWD/src/randomx/build/librandomx.a" \
            -DBRISVIA_RANDOMX_INCLUDE="$PWD/src/randomx/src"
          cmake --build build --target bitcoind bitcoin-cli -j3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the miner (mine-once)
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          cargo build --release --manifest-path crates/brisvia-randomx/Cargo.toml --bin mine-once

      - name: Stage binaries (no .exe on macOS) and point the config at them
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          mkdir -p src-tauri/binaries
          cp core/build/bin/bitcoind src-tauri/binaries/bitcoind
          cp core/build/bin/bitcoin-cli src-tauri/binaries/bitcoin-cli
          cp crates/brisvia-randomx/target/release/mine-once src-tauri/binaries/brisvia-worker || \
            cp target/release/mine-once src-tauri/binaries/brisvia-worker
          chmod +x src-tauri/binaries/*
          python3 - <<'PY'
          import json, os
          p = "src-tauri/tauri.conf.json"
          d = json.load(open(p))
          d["bundle"]["resources"] = ["binaries/bitcoind", "binaries/bitcoin-cli", "binaries/brisvia-worker"]
          # macOS: nsis is Windows-only. Sign only if the signing key secret is present:
          # with a key -> "app" yields the signed updater artifact (.app.tar.gz) + "dmg"; without -> just the "dmg".
          signing = bool(os.environ.get("TAURI_SIGNING_PRIVATE_KEY"))
          d["bundle"]["createUpdaterArtifacts"] = signing
          d["bundle"]["targets"] = ["app", "dmg"] if signing else ["dmg"]
          json.dump(d, open(p, "w"), indent=2)
          PY

      # After staging the sidecar binaries, so the Tauri build script finds the resources it validates.
      - name: Rust tests on this platform (golden vector + wallet battery + crate) - MAINNET
        env:
          BRISVIA_WALLET_CASES: "5000"
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          cargo test --manifest-path crates/brisvia-randomx/Cargo.toml -- --skip vector_fast
          cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib wallet_key_tests -- --nocapture

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build the Tauri app (.dmg + signed updater artifact)
        run: npm run tauri build -- --features mainnet
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Smoke test the compiled binaries
        run: |
          ./src-tauri/binaries/bitcoind -version | head -1 || echo "bitcoind version check failed"
          file ./src-tauri/binaries/brisvia-worker || true

      - name: Also stage the .dmg with a fixed (versionless) name for a permanent download link
        # Keeps releases/latest/download/Brisvia-Miner-macOS.dmg working across every version.
        run: cp src-tauri/target/release/bundle/dmg/*.dmg Brisvia-Miner-macOS.dmg

      - name: Guard - the app binary must target MAINNET (coin 9339)
        run: |
          BIN=$(find src-tauri/target/release -maxdepth 1 -name brisvia-miner -type f | head -1)
          grep -a -q '9339h' "$BIN" || { echo 'FALLO: binario NO es mainnet (falta 9339h). Compilar con --features mainnet.'; exit 1; }
          echo 'OK: binario mainnet (9339h)'

      - name: Attach the .dmg and the signed updater artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.5
          draft: true
          files: |
            src-tauri/target/release/bundle/dmg/*.dmg
            Brisvia-Miner-macOS.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
