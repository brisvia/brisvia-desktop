# GENERATED by tools/ci/derive_validation_workflow.py -- DO NOT EDIT BY HAND.
#
# The build steps below are copied byte for byte from build-windows.yml, the workflow that actually
# produces the shipped installer. They are not a second recipe: every ablation failure came from me
# re-typing something the working workflow already had -- a path, a working-directory, an abbreviated
# SHA, CMake flags, a parameter that did not exist. `derive_validation_workflow.py --check` re-derives
# and diffs, so the two cannot drift.
#
# Everything after the app build -- signing, release upload, latest.json -- is deliberately absent. This
# must be incapable of publishing, not merely instructed not to.
#
# What it proves, on the real commit, with real sidecars:
#   the test executable LOADS       exit=0 / 0x00000000
#   it lists at least 61 tests      58 was rc5; 61 is rc5 plus the shutdown tests that now run
#   TaskDialogIndirect is absent    the fail-closed gate, not a grep
#   comctl32.dll is absent
#   every Rust and JavaScript test passes

name: Validate the Windows fix (no publishing)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit to validate (a full SHA, never abbreviated -- checkout asks the remote for a ref)
        required: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-2022
    steps:

      - name: Checkout desktop app
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # Version guard (real bug: tauri.conf said 1.0.2 and Cargo.toml 1.0.0 -> the app showed the old one).
      # If they do not match, the build FAILS here and nothing out of sync gets published.
      - name: Guard - tauri.conf.json and Cargo.toml versions must match
        shell: bash
        env:
          GITHUB_WORKFLOW_FILE: .github/workflows/build-windows.yml
        run: |
          TC=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/tauri.conf.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          CG=$(grep -oE '^version = "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          # The tag the release attaches to has to be the SAME number: otherwise the updater
          # offers people a version that does not match the one the installer carries.
          TAG=$(grep -oE 'tag_name: v[0-9]+\.[0-9]+\.[0-9]+' "$GITHUB_WORKFLOW_FILE" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tauri.conf.json = $TC | Cargo.toml = $CG | release tag = $TAG"
          if [ "$TC" != "$CG" ]; then echo "FAIL: versions out of sync ($TC vs $CG)"; exit 1; fi
          if [ "$TAG" != "$TC" ]; then echo "FAIL: the release tag (v$TAG) does not match the version ($TC)"; exit 1; fi
          echo "OK: version and tag in sync ($TC)"

      # PRODUCT guards (not logic). They exist because of real bugs the owner found in 2 minutes and
      # a 20-agent audit missed: a Spanish text with the language set to English, and a raw node error
      # on screen. They look at the product as people see it, not at the code in isolation.
      - name: Guard - texts (complete languages, no mixes, no hardcoded text in the HTML)
        shell: bash
        run: python tools/check_textos.py

      - name: Guard - errors (every program error arrives translated in ES and EN)
        shell: bash
        run: python tools/check_error_contract.py

      - name: Checkout core (with the RandomX submodule)
        uses: actions/checkout@v4
        with:
          repository: brisvia/brisvia
          submodules: recursive
          path: core

      - name: Build RandomX (static lib, portable)
        shell: pwsh
        run: |
          # Static MSVC runtime (MultiThreaded) to match the vs2022-static preset; otherwise the
          # final link fails with LNK1169 (multiply defined symbols from libucrt).
          cmake -S core/src/randomx -B core/src/randomx/build -DCMAKE_BUILD_TYPE=Release -DARCH=default `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build core/src/randomx/build --config Release -j
          $rx = Get-ChildItem -Path core/src/randomx/build -Recurse -Filter randomx.lib | Select-Object -First 1
          echo "RANDOMX_LIB=$($rx.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Mark job start (used to prove the sidecar was built by THIS run)
        shell: pwsh
        run: |
          $t = (Get-Date).ToUniversalTime().ToString("o")
          "JOB_START_UTC=$t" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "job start (UTC): $t"

      - name: Configure and build bitcoind + bitcoin-cli (MSVC + vcpkg, wallet only)
        shell: pwsh
        working-directory: core
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT   # GitHub Windows runners ship vcpkg here
          cmake --preset vs2022-static -B build `
            -DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON -DVCPKG_MANIFEST_FEATURES=wallet `
            -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF -DWITH_ZMQ=OFF -DENABLE_IPC=OFF `
            -DBRISVIA_RANDOMX_LIB="$env:RANDOMX_LIB" `
            -DBRISVIA_RANDOMX_INCLUDE="$PWD/src/randomx/src"
          cmake --build build --config Release --target bitcoind bitcoin-cli -j

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the miner (mine-once)
        shell: pwsh
        run: |
          $env:RANDOMX_LIB_DIR = (Split-Path $env:RANDOMX_LIB)
          cargo build --release --manifest-path crates/brisvia-randomx/Cargo.toml --bin mine-once

      - name: Stage binaries (.exe)
        shell: pwsh
        run: |
          # PROVENANCE GUARD. This step used to do `Get-ChildItem -Recurse | Select-Object -First 1`: it
          # picked a bitcoind by NAME and took whatever came first. With zero matches $bd was $null and any
          # bitcoind already sitting in src-tauri/binaries would have shipped instead; with two matches it
          # picked one non-deterministically. A stale node is not a loud failure — it is a DIFFERENT NETWORK
          # that only reveals itself on launch day. (Real case, 2026-07-15: a 9-July bitcoind.exe carrying
          # the pre-recalibration genesis 7f1cf9cf was found in a working tree.)
          # Rules: the binary must be UNIQUE, must have been produced by THIS run, and its hash is recorded
          # so the packaged copy can be compared against it later.
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Remove-Item src-tauri/binaries/* -Force -ErrorAction SilentlyContinue  # nothing pre-existing survives

          function Take-One($path, $filter, $extra) {
            $all = @(Get-ChildItem -Path $path -Recurse -Filter $filter -ErrorAction SilentlyContinue)
            if ($extra) { $all = @($all | Where-Object $extra) }
            if ($all.Count -eq 0) { throw "FAIL: no $filter was compiled in this job. A pre-existing binary is NOT packaged." }
            if ($all.Count -gt 1) { throw "FAIL: there are $($all.Count) copies of $filter and I cannot tell which is this build's: $($all.FullName -join ', ')" }
            if ($all[0].LastWriteTimeUtc -lt [datetime]::Parse($env:JOB_START_UTC)) {
              throw "FAIL: $filter is older than the job start ($($all[0].LastWriteTimeUtc) < $env:JOB_START_UTC): this build did not produce it."
            }
            return $all[0]
          }

          $bd  = Take-One "core/build" "bitcoind.exe" $null
          $cli = Take-One "core/build" "bitcoin-cli.exe" $null
          $mw  = Take-One "." "mine-once.exe" { $_.FullName -match 'release' }
          Copy-Item $bd.FullName  src-tauri/binaries/bitcoind.exe
          Copy-Item $cli.FullName src-tauri/binaries/bitcoin-cli.exe
          Copy-Item $mw.FullName  src-tauri/binaries/brisvia-worker.exe

          # Record the hash of what we staged: the packaged sidecar is compared against this after the build.
          $h = (Get-FileHash src-tauri/binaries/bitcoind.exe -Algorithm SHA256).Hash.ToLower()
          "SIDECAR_SHA256=$h" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "sidecar bitcoind.exe SHA-256: $h"
          Get-ChildItem src-tauri/binaries

      # After staging the sidecar binaries, so the Tauri build script finds the resources it validates.
      - name: Rust tests on this platform (golden vector + wallet battery + crate) - MAINNET
        shell: pwsh
        env:
          BRISVIA_WALLET_CASES: "5000"
        run: |
          $env:RANDOMX_LIB_DIR = (Split-Path $env:RANDOMX_LIB)
          cargo test --manifest-path crates/brisvia-randomx/Cargo.toml -- --skip vector_fast
          cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib wallet_key_tests -- --nocapture

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build the Tauri app (NSIS installer, no signing, no updater artifacts)
        shell: pwsh
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) { throw "the validation job must not receive the production signing key" }
          npm run tauri build -- --features mainnet --config src-tauri/tauri.validation.conf.json
          $sigs = Get-ChildItem -Recurse -Filter *.sig -ErrorAction SilentlyContinue
          if ($sigs) { throw "a .sig artifact was produced: validation must not sign -- $($sigs.FullName -join ', ')" }

      # ---------------------------------------------------------------------------------------------
      # From here down: validation. Nothing above this line was written by hand.
      # ---------------------------------------------------------------------------------------------

      - name: The test executable loads, and lists its tests
        id: load
        shell: pwsh
        run: |
          $env:RANDOMX_LIB_DIR = (Split-Path $env:RANDOMX_LIB)
          New-Item -ItemType Directory -Force -Path evidence | Out-Null
          . "$env:GITHUB_WORKSPACE\tools\ci\Invoke-NativeProcess.ps1"

          $json = cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib --no-run --message-format=json
          $json | Out-File evidence\cargo-json.txt

          # profile.test marks THIS artifact as a test binary. target.test only says a target CAN be
          # tested -- filtering on that matched nothing and cost a whole run.
          $found = @()
          foreach ($line in $json) {
            if ($line -notmatch '^\s*\{') { continue }
            try { $m = $line | ConvertFrom-Json } catch { continue }
            if ($m.reason -eq 'compiler-artifact' -and $m.executable -and $m.profile.test -eq $true) {
              $found += $m.executable
            }
          }
          if ($found.Count -ne 1) { throw "expected exactly 1 test executable, found $($found.Count)" }
          $exe = $found[0]
          Copy-Item $exe evidence\test.exe
          $sha = (Get-FileHash $exe -Algorithm SHA256).Hash

          # --list needs it to LOAD but runs no test. The exit code comes off the process object;
          # nothing critical is read through a pipeline.
          $r = Invoke-NativeProcess -FilePath $exe -Arguments @('--list') -OutputDir evidence
          Write-NativeProcessReport -Result $r -PreviewLines 5
          $tests = ($r.StdOut -split "`n" | Where-Object { $_ -match ': test$' }).Count

          Write-Host "SHA=${{ inputs.ref }} EXE_SHA256=$sha EXIT=$($r.ExitCode) HEX=$($r.ExitCodeHex) TESTS=$tests"
          "exe_sha256=$sha"          | Out-File -Append $env:GITHUB_OUTPUT
          "exit_dec=$($r.ExitCode)"  | Out-File -Append $env:GITHUB_OUTPUT
          "tests=$tests"             | Out-File -Append $env:GITHUB_OUTPUT

          if ($r.ExitCode -ne 0) {
            throw "the test executable does not load: exit $($r.ExitCode) / $($r.ExitCodeHex). rc6 died here with 0xC0000139."
          }
          if ($tests -lt 61) {
            throw "listed $tests tests, expected at least 61. rc5 had 58; 61 is rc5 plus the shutdown tests. Fewer means they were deleted, not fixed."
          }

      - name: It must never import TaskDialogIndirect again
        shell: pwsh
        run: |
          python tools/ci/check_test_exe_imports.py --self-test
          if ($LASTEXITCODE -ne 0) { throw "the import gate does not trust itself" }
          # dumpbin is only for a human-readable imports.txt and lives in the MSVC toolchain, which is
          # not on PATH in this step. It is decorative: the gate below reads the PE directly. So it is
          # best-effort, never fatal -- a missing dumpbin must not fail a step whose real check is python.
          if (Get-Command dumpbin -ErrorAction SilentlyContinue) {
            dumpbin /IMPORTS evidence\test.exe | Out-File evidence\imports.txt
          }
          python tools/ci/check_test_exe_imports.py evidence\test.exe
          if ($LASTEXITCODE -ne 0) { throw "the test executable imports something that kills it before main" }

      - name: Every Rust test
        shell: pwsh
        run: |
          $env:RANDOMX_LIB_DIR = (Split-Path $env:RANDOMX_LIB)
          cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib -- --nocapture 2>&1 | Tee-Object evidence\rust-tests.txt
          if ($LASTEXITCODE -ne 0) { throw "Rust tests failed" }

      # The JS unit tests, run with node's own runner. There is NO `npm test` script -- package.json has
      # test:e2e (Playwright), test:rust, test:e2e:real, but no `test`. The Playwright e2e suite needs the
      # built app and runs in its own workflow (e2e.yml); duplicating it here would be heavy and redundant.
      # This runs the pure node unit tests (*.test.js) -- amount-separator today, whatever is added later.
      - name: JavaScript unit tests (node --test; Playwright e2e is covered by e2e.yml)
        shell: pwsh
        run: |
          $unit = Get-ChildItem tests -Recurse -Filter *.test.js | ForEach-Object { $_.FullName }
          if (-not $unit) { throw "no *.test.js unit tests found -- did the test files move?" }
          node --test $unit 2>&1 | Tee-Object evidence\js-tests.txt
          if ($LASTEXITCODE -ne 0) { throw "JavaScript unit tests failed" }

      - name: Seal the evidence
        if: always()
        shell: pwsh
        run: |
          $m = [ordered]@{
            run_id          = "${{ github.run_id }}"
            run_attempt     = "${{ github.run_attempt }}"
            workflow_commit = "${{ github.sha }}"
            validated_ref   = "${{ inputs.ref }}"
            validated_sha   = "$(git rev-parse HEAD)"
            runner          = "windows-2022"
            generated_utc   = [DateTime]::UtcNow.ToString('o')
            test_exe_sha256 = "${{ steps.load.outputs.exe_sha256 }}"
            exit_decimal    = "${{ steps.load.outputs.exit_dec }}"
            tests_listed    = "${{ steps.load.outputs.tests }}"
            tool_hashes     = @{}
          }
          Get-ChildItem tools/ci -Filter *.ps1 | ForEach-Object {
            $m.tool_hashes[$_.Name] = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
          }
          # No -Encoding UTF8: PS 5.1 writes a BOM there and json.load, jq and fromJSON all choke.
          $m | ConvertTo-Json -Depth 4 | Out-File evidence\manifest.json
          Get-Content evidence\manifest.json

      - name: Keep the installer and the evidence, published nowhere
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-windows-validation
          path: |
            evidence/*
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
