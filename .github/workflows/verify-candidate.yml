name: Verify candidate artifacts

# Verifies the draft artifacts WITHOUT RECOMPILING: downloads each package, pulls the node out of it,
# runs it on its native system and asks IT which network it is.
#
# Why it exists (audit, 2026-07-15): "It is not enough for the workflow to have run the binary before
# packaging it. You have to run the one that came out of the final package." The build verifies what it
# stages; this verifies what people download. They are not the same, and the difference between them is
# exactly where a wrong sidecar slips in.
#
# Runs on disposable runners: it does not touch anyone's machine.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Draft release tag to verify (e.g. v1.0.6)"
        required: true
        default: "v1.0.6"

# A DRAFT release is not visible to the default token: that is precisely why it is a draft.
# Verifying a candidate BEFORE publishing it requires reading exactly those.
permissions:
  contents: write

env:
  GENESIS: aa6bc268339aa9f4f2e39ae33aca7b7e48e395033d08d37c08f828890af7baf7
  # The three seeds, serialized as they go inside the binary: 0x01 (IPv4), 0x04 (length), IP, port BE.
  SEED_HOSTINGER: "0104bb4df091247e"
  SEED_ORACLE1: "01048150fa24247e"
  SEED_ORACLE2: "0104819f6c66247e"

jobs:
  windows:
    name: Windows — extract the node from the installer and run it
    runs-on: windows-latest
    steps:
      - name: Fetch the repo (for the verifier)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }} # the draft release tag does not exist in git yet; use the SHA it was built from

      - name: Download the draft installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" --repo ${{ github.repository }} `
             --pattern "*_x64-setup.exe" --dir dl
          Get-ChildItem dl | ForEach-Object { Write-Host "  $($_.Name)  $($_.Length) bytes" }

      - name: Extract the sidecar from the installer
        shell: pwsh
        run: |
          $setup = Get-ChildItem dl -Filter *_x64-setup.exe | Select-Object -First 1
          & 7z x "$($setup.FullName)" -o"unpack" -y | Out-Null
          $nodes = @(Get-ChildItem unpack -Recurse -Filter bitcoind.exe)
          if ($nodes.Count -ne 1) { throw "FAIL: the installer carries $($nodes.Count) bitcoind.exe, exactly 1 was expected" }
          $h = (Get-FileHash $nodes[0].FullName -Algorithm SHA256).Hash.ToLower()
          Write-Host "extracted sidecar: $($nodes[0].FullName)"
          Write-Host "SHA-256: $h"
          "NODE=$($nodes[0].FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          $cli = @(Get-ChildItem unpack -Recurse -Filter bitcoin-cli.exe)[0]
          "CLI=$($cli.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Does the DISTRIBUTED node open on a user's machine?
        shell: bash # bash script (python3, 2>/dev/null, ||); on Windows the default shell is pwsh and breaks it
        run: |
          # On the sidecar taken from the FINAL DOWNLOADED PACKAGE, not on the compiler's binary.
          # Compiling does not prove portability; packaging does not either. The only thing that counts is
          # what people download. See tools/check_portable.py.
          python3 -m pip install --quiet --break-system-packages lief 2>/dev/null || python3 -m pip install --quiet lief
          python3 tools/check_portable.py --self-test
          python3 tools/check_portable.py "$NODE" "$CLI"

      - name: The three seeds are in the distributed node
        shell: pwsh
        run: |
          # Without a DNS seed, this list is the ONLY way a new client has to find the network.
          # A missing one gives no error: it is a seed node nobody can reach, and it is discovered on launch
          # day. The serialized pattern is searched inside the binary, not in the source code.
          $bytes = [System.IO.File]::ReadAllBytes($env:NODE)
          $hex = [System.BitConverter]::ToString($bytes).Replace("-", "").ToLower()
          $faltan = @()
          foreach ($s in @(@("Hostinger", $env:SEED_HOSTINGER), @("Oracle-1", $env:SEED_ORACLE1), @("Oracle-2", $env:SEED_ORACLE2))) {
            if ($hex.Contains($s[1])) { Write-Host "  OK    seed $($s[0])" } else { Write-Host "  MISSING seed $($s[0])"; $faltan += $s[0] }
          }
          if ($faltan.Count -gt 0) { throw "FAIL: seeds missing in the distributed binary: $($faltan -join ', ')" }

      - name: Run the extracted node and ask it its network
        shell: pwsh
        run: |
          # The test that matters: do not trust the source tree nor the binary that was staged.
          # Ask the binary that people actually install.
          $dd = Join-Path $env:RUNNER_TEMP "probe"
          New-Item -ItemType Directory -Force -Path $dd | Out-Null
          "server=1`nrpcuser=t`nrpcpassword=t`nlisten=0`n[brisvia]`nrpcport=28471" | Out-File -Encoding ascii "$dd/bitcoin.conf"
          $p = Start-Process -FilePath $env:NODE -ArgumentList "-datadir=$dd","-chain=brisvia" -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 18
          $a = @("-datadir=$dd","-chain=brisvia","-rpcport=28471","-rpcuser=t","-rpcpassword=t")
          $genesis = (& $env:CLI @a getblockhash 0) 2>&1 | Out-String
          $info    = (& $env:CLI @a getblockchaininfo) 2>&1 | Out-String
          & $env:CLI @a stop 2>&1 | Out-Null
          Start-Sleep -Seconds 5
          $genesis = $genesis.Trim()
          Write-Host "reported genesis : $genesis"
          if ($genesis -ne $env:GENESIS) { throw "FAIL: the distributed node has genesis $genesis, not the real Brisvia network's" }
          if ($info -notmatch '"chain":\s*"brisvia"') { throw "FAIL: the node is not on the brisvia network" }
          if ($info -notmatch '"blocks":\s*0') { throw "FAIL: the node does not start at height 0" }
          # Clean shutdown: if a process stays alive, the next version's installer will kill it.
          if ($p -and -not $p.HasExited) { throw "FAIL: the node did not close on its own with stop; an orphan process would remain" }
          Write-Host "OK: brisvia network, height 0, correct genesis, clean shutdown"

  linux:
    name: Linux — extract the node from the .deb and run it
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the repo (for the verifier)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }} # the draft release tag does not exist in git yet; use the SHA it was built from

      - name: Download the draft .deb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" --repo ${{ github.repository }} --pattern "*_amd64.deb" --dir dl
          ls -la dl

      - name: INSTALL the .deb (the way a user does) and locate the sidecar
        run: |
          # It is INSTALLED, not extracted by hand. Extracting it leaves the binary without the libraries the
          # package declares as dependencies and it fails with "error while loading shared libraries" -- a
          # failure of the test method, not of the package. Installing it also verifies that the declared
          # dependencies are the correct ones, which is exactly what would happen to a person.
          sudo apt-get update -qq
          sudo dpkg -i dl/*_amd64.deb || sudo apt-get -y -f install
          NODES=$(find / -path /proc -prune -o -name bitcoind -type f -print 2>/dev/null | grep -i brisvia | wc -l)
          [ "$NODES" -eq 1 ] || { echo "FAIL: there are $NODES Brisvia bitcoind installed, 1 was expected"; exit 1; }
          NODE=$(find / -path /proc -prune -o -name bitcoind -type f -print 2>/dev/null | grep -i brisvia)
          CLI=$(find / -path /proc -prune -o -name bitcoin-cli -type f -print 2>/dev/null | grep -i brisvia)
          echo "NODE=$NODE" >> "$GITHUB_ENV"
          echo "CLI=$CLI" >> "$GITHUB_ENV"
          echo "installed sidecar: $NODE"
          echo "SHA-256: $(sha256sum "$NODE" | cut -d' ' -f1)"
          ldd "$NODE" | grep -i "not found" && { echo "FAIL: the installed node is missing libraries"; exit 1; } || echo "  all libraries resolved"

      - name: Does the DISTRIBUTED node open on a user's machine?
        shell: bash # bash script (python3, 2>/dev/null, ||); on Windows the default shell is pwsh and breaks it
        run: |
          # On the sidecar taken from the FINAL DOWNLOADED PACKAGE, not on the compiler's binary.
          # Compiling does not prove portability; packaging does not either. The only thing that counts is
          # what people download. See tools/check_portable.py.
          python3 -m pip install --quiet --break-system-packages lief 2>/dev/null || python3 -m pip install --quiet lief
          python3 tools/check_portable.py --self-test
          python3 tools/check_portable.py "$NODE" "$CLI"

      - name: The three seeds are in the distributed node
        run: |
          HEX=$(xxd -p "$NODE" | tr -d '\n')
          FALTAN=""
          for s in "Hostinger:$SEED_HOSTINGER" "Oracle-1:$SEED_ORACLE1" "Oracle-2:$SEED_ORACLE2"; do
            n="${s%%:*}"; p="${s##*:}"
            if echo "$HEX" | grep -q "$p"; then echo "  OK    seed $n"; else echo "  MISSING seed $n"; FALTAN="$FALTAN $n"; fi
          done
          [ -z "$FALTAN" ] || { echo "FAIL: missing seeds:$FALTAN"; exit 1; }

      - name: Run the extracted node and ask it its network
        run: |
          DD=$(mktemp -d)
          { echo "server=1"; echo "rpcuser=t"; echo "rpcpassword=t"; echo "listen=0"; echo "[brisvia]"; echo "rpcport=28472"; } > "$DD/bitcoin.conf"
          "$NODE" -datadir="$DD" -chain=brisvia &
          NPID=$!
          sleep 18
          A="-datadir=$DD -chain=brisvia -rpcport=28472 -rpcuser=t -rpcpassword=t"
          GEN=$("$CLI" $A getblockhash 0 2>&1 | tr -d '[:space:]')
          INFO=$("$CLI" $A getblockchaininfo 2>&1)
          "$CLI" $A stop >/dev/null 2>&1 || true
          sleep 5
          echo "reported genesis : $GEN"
          [ "$GEN" = "$GENESIS" ] || { echo "FAIL: genesis $GEN, not the real network's"; exit 1; }
          echo "$INFO" | grep -q '"chain": *"brisvia"' || { echo "FAIL: not on the brisvia network"; exit 1; }
          echo "$INFO" | grep -q '"blocks": *0' || { echo "FAIL: does not start at height 0"; exit 1; }
          kill -0 $NPID 2>/dev/null && { echo "FAIL: the node did not close on its own; an orphan process would remain"; exit 1; } || true
          echo "OK: brisvia network, height 0, correct genesis, clean shutdown"

  macos:
    name: macOS — extract the node from the .app and run it
    runs-on: macos-latest
    steps:
      - name: Fetch the repo (for the verifier)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }} # the draft release tag does not exist in git yet; use the SHA it was built from

      - name: Download the draft package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.tag }}" --repo ${{ github.repository }} --pattern "*.app.tar.gz" --dir dl
          ls -la dl

      - name: Extract the sidecar
        run: |
          cd dl && mkdir -p x && tar -xzf *.app.tar.gz -C x
          NODES=$(find x -name bitcoind | wc -l | tr -d ' ')
          [ "$NODES" -eq 1 ] || { echo "FAIL: the package carries $NODES bitcoind, 1 was expected"; exit 1; }
          NODE=$(find x -name bitcoind)
          CLI=$(find x -name bitcoin-cli)
          chmod +x "$NODE" "$CLI"
          # Gatekeeper marks downloaded files as quarantined and will not let them run: the attribute is
          # removed, which is what happens when a person opens it and accepts the system's warning.
          xattr -dr com.apple.quarantine "$NODE" "$CLI" 2>/dev/null || true
          echo "NODE=$PWD/$NODE" >> "$GITHUB_ENV"
          echo "CLI=$PWD/$CLI" >> "$GITHUB_ENV"
          echo "sidecar: $NODE  ($(shasum -a 256 "$NODE" | cut -d' ' -f1))"

      - name: Does the DISTRIBUTED node open on a user's machine?
        shell: bash # bash script (python3, 2>/dev/null, ||); on Windows the default shell is pwsh and breaks it
        run: |
          # On the sidecar taken from the FINAL DOWNLOADED PACKAGE, not on the compiler's binary.
          # Compiling does not prove portability; packaging does not either. The only thing that counts is
          # what people download. See tools/check_portable.py.
          python3 -m pip install --quiet --break-system-packages lief 2>/dev/null || python3 -m pip install --quiet lief
          python3 tools/check_portable.py --self-test
          python3 tools/check_portable.py "$NODE" "$CLI"

      - name: The three seeds are in the distributed node
        run: |
          HEX=$(xxd -p "$NODE" | tr -d '\n')
          FALTAN=""
          for s in "Hostinger:$SEED_HOSTINGER" "Oracle-1:$SEED_ORACLE1" "Oracle-2:$SEED_ORACLE2"; do
            n="${s%%:*}"; p="${s##*:}"
            if echo "$HEX" | grep -q "$p"; then echo "  OK    seed $n"; else echo "  MISSING seed $n"; FALTAN="$FALTAN $n"; fi
          done
          [ -z "$FALTAN" ] || { echo "FAIL: missing seeds:$FALTAN"; exit 1; }

      - name: Run the extracted node and ask it its network
        run: |
          DD=$(mktemp -d)
          { echo "server=1"; echo "rpcuser=t"; echo "rpcpassword=t"; echo "listen=0"; echo "[brisvia]"; echo "rpcport=28473"; } > "$DD/bitcoin.conf"
          "$NODE" -datadir="$DD" -chain=brisvia &
          NPID=$!
          sleep 18
          A="-datadir=$DD -chain=brisvia -rpcport=28473 -rpcuser=t -rpcpassword=t"
          GEN=$("$CLI" $A getblockhash 0 2>&1 | tr -d '[:space:]')
          INFO=$("$CLI" $A getblockchaininfo 2>&1)
          "$CLI" $A stop >/dev/null 2>&1 || true
          sleep 5
          echo "reported genesis : $GEN"
          [ "$GEN" = "$GENESIS" ] || { echo "FAIL: genesis $GEN, not the real network's"; exit 1; }
          echo "$INFO" | grep -q '"chain": *"brisvia"' || { echo "FAIL: not on the brisvia network"; exit 1; }
          kill -0 $NPID 2>/dev/null && { echo "FAIL: the node did not close on its own; an orphan process would remain"; exit 1; } || true
          echo "OK: brisvia network, height 0, correct genesis, clean shutdown"
