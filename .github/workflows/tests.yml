name: Tests (Rust unit + property)

# Runs the Rust test suites on a clean Ubuntu runner, independent of the release builds:
#  - brisvia-randomx crate tests (byte-exact header, stratum protocol, endianness, target).
#  - the mainnet wallet-derivation property battery: thousands of BRAND-NEW wallets with the
#    invariants that must hold for every real receiving address (brv/9339/determinism/uniqueness),
#    plus rejection of invalid mnemonics.
# Triggered manually (Actions tab) or on push to main touching the tested code.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src-tauri/src/**'
      - 'crates/brisvia-randomx/**'
      - '.github/workflows/tests.yml'

jobs:
  rust-tests:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4

      - name: Checkout core (with the RandomX submodule)
        uses: actions/checkout@v4
        with:
          repository: brisvia/brisvia
          submodules: recursive
          path: core

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake build-essential pkg-config \
            libboost-dev libevent-dev libsqlite3-dev libssl-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev

      - name: Build RandomX (static lib)
        run: |
          cmake -S core/src/randomx -B core/src/randomx/build -DCMAKE_BUILD_TYPE=Release
          cmake --build core/src/randomx/build -j3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
            crates/brisvia-randomx

      # run_tests_verified PROVES the suite ran: exit zero is not proof. A filter that matches nothing, a
      # renamed module or a hidden feature all produce a GREEN run that tested NOTHING -- and that is exactly
      # how the wallet battery below sat red for hours without anyone noticing.
      - name: brisvia-randomx crate tests (header / stratum / endianness / target)
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          # skip vector_fast: it allocates the ~2GB RandomX dataset (light mode covers the same hash)
          python tools/run_tests_verified.py --name "miner crate" --min 28 -- cargo test --manifest-path crates/brisvia-randomx/Cargo.toml -- --skip vector_fast

      # Tauri's build script refuses to build unless every bundled resource exists, and tauri.conf.json lists
      # the Windows names. Without these placeholders the step below fails with "resource path
      # binaries/bitcoind.exe doesn't exist" BEFORE running a single test -- which is exactly what was
      # happening: this battery had been red for hours, on every commit, and nobody noticed. Empty files are
      # enough because these tests derive keys; they never execute the node.
      - name: Placeholder binaries (the wallet tests never run the node, but the build script checks they exist)
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/bitcoind.exe src-tauri/binaries/bitcoin-cli.exe src-tauri/binaries/brisvia-worker.exe

      - name: Wallet derivation property battery (mainnet, 10000 fresh wallets)
        env:
          BRISVIA_WALLET_CASES: "10000"
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          python tools/run_tests_verified.py --name "wallet battery" --min 2 --min-seconds 20 -- cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib wallet_key_tests -- --nocapture

      # The repair logic decides whether to rebuild the node's database on a user's machine. Its tests belong
      # in the same battery that guards the wallet.
      - name: Node self-repair tests (a full disk is never "repaired", an old crash is not today's)
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          python tools/run_tests_verified.py --name "node self-repair" --min 13 -- cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib repair -- --nocapture

      # The product guards: they are cheap and they catch what the audits did not.
      - name: Guard - texts (complete languages, no mixes, no hardcoded text in the HTML)
        run: python tools/check_textos.py

      - name: Guard - errors (every program error arrives translated in ES and EN)
        run: python tools/check_error_contract.py
