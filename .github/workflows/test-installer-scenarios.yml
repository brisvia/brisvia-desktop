# GENERATED by tools/ci/derive_scenario_workflow.py -- DO NOT EDIT BY HAND.
#
# Phase 1 of the installer-hook validation: run the shipped shutdown-brisvia-node.ps1 directly against
# real bitcoind nodes, one clean job per scenario. The build half (checkout, RandomX, bitcoind) is copied
# byte for byte from build-windows.yml; `derive_scenario_workflow.py --check` re-derives and diffs so the
# two cannot drift. The full installer /S pass is a separate later phase.
#
# The nodes are launched the way the app launches them -- `bitcoind -datadir=<dd>` on the command line,
# chain and rpcport in bitcoin.conf -- so the scenarios exercise the real identification path, including
# the chain-from-conf fallback, instead of a convenient shortcut that would pass while the installer fails.

name: Installer shutdown scenarios (phase 1, direct)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit to test (full SHA, never abbreviated)
        required: true

permissions:
  contents: read

jobs:
  build-node:
    runs-on: windows-2022
    steps:

      - name: Checkout desktop app
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      # Version guard (real bug: tauri.conf said 1.0.2 and Cargo.toml 1.0.0 -> the app showed the old one).
      # If they do not match, the build FAILS here and nothing out of sync gets published.
      - name: Guard - tauri.conf.json and Cargo.toml versions must match
        shell: bash
        env:
          GITHUB_WORKFLOW_FILE: .github/workflows/build-windows.yml
        run: |
          TC=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/tauri.conf.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          CG=$(grep -oE '^version = "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          # The tag the release attaches to has to be the SAME number: otherwise the updater
          # offers people a version that does not match the one the installer carries.
          TAG=$(grep -oE 'tag_name: v[0-9]+\.[0-9]+\.[0-9]+' "$GITHUB_WORKFLOW_FILE" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tauri.conf.json = $TC | Cargo.toml = $CG | release tag = $TAG"
          if [ "$TC" != "$CG" ]; then echo "FAIL: versions out of sync ($TC vs $CG)"; exit 1; fi
          if [ "$TAG" != "$TC" ]; then echo "FAIL: the release tag (v$TAG) does not match the version ($TC)"; exit 1; fi
          echo "OK: version and tag in sync ($TC)"

      # PRODUCT guards (not logic). They exist because of real bugs the owner found in 2 minutes and
      # a 20-agent audit missed: a Spanish text with the language set to English, and a raw node error
      # on screen. They look at the product as people see it, not at the code in isolation.
      - name: Guard - texts (complete languages, no mixes, no hardcoded text in the HTML)
        shell: bash
        run: python tools/check_textos.py

      - name: Guard - errors (every program error arrives translated in ES and EN)
        shell: bash
        run: python tools/check_error_contract.py

      - name: Checkout core (with the RandomX submodule)
        uses: actions/checkout@v4
        with:
          repository: brisvia/brisvia
          submodules: recursive
          path: core

      - name: Build RandomX (static lib, portable)
        shell: pwsh
        run: |
          # Static MSVC runtime (MultiThreaded) to match the vs2022-static preset; otherwise the
          # final link fails with LNK1169 (multiply defined symbols from libucrt).
          cmake -S core/src/randomx -B core/src/randomx/build -DCMAKE_BUILD_TYPE=Release -DARCH=default `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build core/src/randomx/build --config Release -j
          $rx = Get-ChildItem -Path core/src/randomx/build -Recurse -Filter randomx.lib | Select-Object -First 1
          echo "RANDOMX_LIB=$($rx.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Mark job start (used to prove the sidecar was built by THIS run)
        shell: pwsh
        run: |
          $t = (Get-Date).ToUniversalTime().ToString("o")
          "JOB_START_UTC=$t" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "job start (UTC): $t"

      - name: Configure and build bitcoind + bitcoin-cli (MSVC + vcpkg, wallet only)
        shell: pwsh
        working-directory: core
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT   # GitHub Windows runners ship vcpkg here
          cmake --preset vs2022-static -B build `
            -DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON -DVCPKG_MANIFEST_FEATURES=wallet `
            -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF -DWITH_ZMQ=OFF -DENABLE_IPC=OFF `
            -DBRISVIA_RANDOMX_LIB="$env:RANDOMX_LIB" `
            -DBRISVIA_RANDOMX_INCLUDE="$PWD/src/randomx/src"
          cmake --build build --config Release --target bitcoind bitcoin-cli -j

      - name: Stage bitcoind for the scenario jobs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\node | Out-Null
          # core/build, not build: the copied bitcoind step runs with working-directory: core, so -B build
          # creates core/build. Looking in ./build found nothing -> "no bitcoind.exe was built".
          $bd = Get-ChildItem core/build -Recurse -Filter bitcoind.exe | Select-Object -First 1
          if (-not $bd) { throw "no bitcoind.exe was built" }
          Copy-Item $bd.FullName C:\node\bitcoind.exe
          "bitcoind sha256 $((Get-FileHash C:\node\bitcoind.exe -Algorithm SHA256).Hash)" | Write-Host

      - name: Upload bitcoind
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-bitcoind
          path: C:\node\bitcoind.exe
          if-no-files-found: error

  scenarios:
    needs: build-node
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        scenario: [solo-brisvia, brisvia-plus-foreign, foreign-only, unicode-datadir, stale-reused-pid, bad-rpc-channel, multiple-valid, multiple-one-ambiguous]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Get the built bitcoind
        uses: actions/download-artifact@v4
        with:
          name: run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-bitcoind
          path: node

      - name: Run scenario ${{ matrix.scenario }}
        shell: pwsh
        run: |
          $work = Join-Path $env:RUNNER_TEMP "scn-${{ matrix.scenario }}"
          New-Item -ItemType Directory -Force -Path $work | Out-Null
          & tools\ci\run-shutdown-scenario.ps1 `
              -Scenario ${{ matrix.scenario }} `
              -BitcoindExe (Resolve-Path node/bitcoind.exe) `
              -ShutdownScript (Resolve-Path src-tauri/windows/shutdown-brisvia-node.ps1) `
              -WorkRoot $work
          $code = $LASTEXITCODE
          Copy-Item (Join-Path $work 'evidence.jsonl') "C:\evidence-${{ matrix.scenario }}.jsonl" -ErrorAction SilentlyContinue
          if ($code -ne 0) { throw "scenario ${{ matrix.scenario }} failed (exit $code)" }

      - name: Keep the evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}-attempt-${{ github.run_attempt }}-scenario-${{ matrix.scenario }}
          path: C:\evidence-${{ matrix.scenario }}.jsonl
          if-no-files-found: warn
