name: Verify migration 1.0.5 -> 1.0.6 (real install-over-install)

# ChatGPT's #1 required control before sealing rc7: prove the EXACT installers upgrade cleanly.
# Four jobs:
#   build-v105-windows          rebuild the 1.0.5 NSIS from its tag (no updater artifacts, no signing key)
#   migration-windows           install 1.0.5 -> create wallet (installed app, tauri-driver) -> install 1.0.6
#                               exact over it -> the wallet, address and datadir survive; no reindex/rescan
#   smoke-linux / smoke-macos   open the EXACT sealed package; node + worker start, respond and close clean
#
# The candidate 1.0.6 packages are the sealed fe9657e artifacts already on the v1.0.6 draft release.
# NOTE (documented limitation): the sealed installers are MAINNET builds (the regtest redirect is compiled
# out of the public binary). So the installed-app test proves wallet creation + seed/address/datadir
# survival across the update; funding + a confirmed transaction surviving is covered by the regtest E2E
# transaction test (#14) on the e2e binary, which shares the exact same wallet module and byte-identical
# seed format.

on:
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: "Draft tag holding the sealed 1.0.6 packages"
        required: true
        default: "v1.0.6"

permissions:
  contents: write # draft releases are only visible to write-level tokens

jobs:
  # ------------------------------------------------------------------------------------------------
  build-v105-windows:
    name: Rebuild the 1.0.5 NSIS from its tag
    runs-on: windows-2022
    steps:
      - name: Checkout the desktop app at the v1.0.5 tag
        uses: actions/checkout@v4
        with:
          ref: v1.0.5

      - name: Confirm the checked-out version is exactly 1.0.5
        shell: bash
        run: |
          TC=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/tauri.conf.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          CG=$(grep -oE '^version = "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tauri.conf.json=$TC  Cargo.toml=$CG"
          if [ "$TC" != "1.0.5" ] || [ "$CG" != "1.0.5" ]; then echo "FAIL: this is not 1.0.5 ($TC / $CG)"; exit 1; fi
          echo "OK: rebuilding 1.0.5 from the official tag with the repository recipe (NOT byte-identical to the removed installer)."

      - name: Disable updater artifacts for this rebuild (no minisign key supplied)
        shell: pwsh
        run: |
          $conf = "src-tauri/tauri.conf.json"
          $j = Get-Content $conf -Raw | ConvertFrom-Json
          $j.bundle.createUpdaterArtifacts = $false
          $j | ConvertTo-Json -Depth 30 | Set-Content $conf -Encoding utf8
          Write-Host "createUpdaterArtifacts set to false for the 1.0.5 rebuild"

      - name: Checkout core (with the RandomX submodule)
        uses: actions/checkout@v4
        with:
          repository: brisvia/brisvia
          submodules: recursive
          path: core

      - name: Build RandomX (static lib, portable)
        shell: pwsh
        run: |
          cmake -S core/src/randomx -B core/src/randomx/build -DCMAKE_BUILD_TYPE=Release -DARCH=default `
            -DCMAKE_POLICY_DEFAULT_CMP0091=NEW -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build core/src/randomx/build --config Release -j
          $rx = Get-ChildItem -Path core/src/randomx/build -Recurse -Filter randomx.lib | Select-Object -First 1
          echo "RANDOMX_LIB=$($rx.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build bitcoind + bitcoin-cli (MSVC + vcpkg, wallet only)
        shell: pwsh
        working-directory: core
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cmake --preset vs2022-static -B build `
            -DVCPKG_MANIFEST_NO_DEFAULT_FEATURES=ON -DVCPKG_MANIFEST_FEATURES=wallet `
            -DBUILD_GUI=OFF -DBUILD_TESTS=OFF -DBUILD_BENCH=OFF -DWITH_ZMQ=OFF -DENABLE_IPC=OFF `
            -DBRISVIA_RANDOMX_LIB="$env:RANDOMX_LIB" `
            -DBRISVIA_RANDOMX_INCLUDE="$PWD/src/randomx/src"
          cmake --build build --config Release --target bitcoind bitcoin-cli -j

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the miner (mine-once)
        shell: pwsh
        run: |
          $env:RANDOMX_LIB_DIR = (Split-Path $env:RANDOMX_LIB)
          cargo build --release --manifest-path crates/brisvia-randomx/Cargo.toml --bin mine-once

      - name: Stage the native binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          Remove-Item src-tauri/binaries/* -Force -ErrorAction SilentlyContinue
          $bd  = Get-ChildItem -Path core/build -Recurse -Filter bitcoind.exe     | Select-Object -First 1
          $cli = Get-ChildItem -Path core/build -Recurse -Filter bitcoin-cli.exe  | Select-Object -First 1
          $mw  = Get-ChildItem -Path . -Recurse -Filter mine-once.exe | Where-Object { $_.FullName -match 'release' } | Select-Object -First 1
          Copy-Item $bd.FullName  src-tauri/binaries/bitcoind.exe
          Copy-Item $cli.FullName src-tauri/binaries/bitcoin-cli.exe
          Copy-Item $mw.FullName  src-tauri/binaries/brisvia-worker.exe

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build the Tauri app (NSIS, mainnet, NO signing key)
        run: npm run tauri build -- --features mainnet

      - name: Collect the 1.0.5 NSIS + a provenance manifest
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "v105"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *-setup.exe | Select-Object -First 1
          if (-not $exe) { throw "FAIL: the 1.0.5 NSIS was not produced" }
          Copy-Item $exe.FullName (Join-Path $out $exe.Name)
          $sh = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          $sc = (Get-FileHash src-tauri/binaries/bitcoind.exe -Algorithm SHA256).Hash.ToLower()
          @{ tag = "v1.0.5"; note = "rebuilt from tag with the repo recipe; not byte-identical to the removed installer";
             installer = $exe.Name; installer_sha256 = $sh; sidecar_bitcoind_sha256 = $sc } |
            ConvertTo-Json | Set-Content (Join-Path $out "manifest-v105.json") -Encoding utf8
          Write-Host "1.0.5 installer: $($exe.Name)  SHA-256 $sh"

      - name: Upload the 1.0.5 installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: brisvia-v105-nsis
          path: ${{ runner.temp }}/v105/*
          retention-days: 2

  # ------------------------------------------------------------------------------------------------
  smoke-linux:
    name: Smoke - the exact 1.0.6 AppImage opens on Linux
    runs-on: ubuntu-22.04
    steps:
      - name: Install WebKit + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-0 xvfb file

      - name: Download the exact 1.0.6 AppImage from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.candidate_tag }}" --repo "${{ github.repository }}" \
            --pattern 'Brisvia.Miner_1.0.6_amd64.AppImage' --dir . --clobber
          chmod +x Brisvia.Miner_1.0.6_amd64.AppImage
          echo "AppImage SHA-256: $(sha256sum Brisvia.Miner_1.0.6_amd64.AppImage | cut -d' ' -f1)"

      - name: Open the exact package and confirm it stays alive
        run: |
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a ./Brisvia.Miner_1.0.6_amd64.AppImage > appimage.log 2>&1 &
          APP_PID=$!
          sleep 20
          if ! kill -0 "$APP_PID" 2>/dev/null; then echo "FAIL: the app died on open"; cat appimage.log; exit 1; fi
          if grep -aiE "panic|error while loading shared libraries|cannot open shared object" appimage.log; then
            echo "FAIL: load error"; exit 1; fi
          echo "OK: the AppImage opened and stayed alive"
          kill -TERM "$APP_PID" 2>/dev/null || true

      - name: Extract the sidecars and smoke-test the exact node + worker
        run: |
          ./Brisvia.Miner_1.0.6_amd64.AppImage --appimage-extract >/dev/null
          BD=$(find squashfs-root -type f -name bitcoind | head -1)
          CLI=$(find squashfs-root -type f -name bitcoin-cli | head -1)
          WK=$(find squashfs-root -type f -name brisvia-worker | head -1)
          echo "bitcoind: $BD"; echo "cli: $CLI"; echo "worker: $WK"
          [ -x "$BD" ] && [ -x "$CLI" ] && [ -x "$WK" ] || { echo "FAIL: a sidecar is missing"; exit 1; }
          DD="$RUNNER_TEMP/brisvia-regtest"; mkdir -p "$DD"
          "$BD" -regtest -datadir="$DD" -server=1 -listen=0 -discover=0 -dnsseed=0 > bitcoind.log 2>&1 &
          NODE_PID=$!
          "$CLI" -regtest -datadir="$DD" -rpcwait getblockchaininfo > /dev/null && echo "OK: node responded"
          "$CLI" -regtest -datadir="$DD" stop; wait "$NODE_PID" 2>/dev/null || true
          "$WK" --version || "$WK" --help >/dev/null 2>&1 || true
          echo "OK: node started, responded and stopped"
          if pgrep -fl "$PWD/squashfs-root"; then echo "FAIL: orphan process"; exit 1; fi

  # ------------------------------------------------------------------------------------------------
  smoke-macos:
    name: Smoke - the exact 1.0.6 .app opens on macOS
    runs-on: macos-14
    steps:
      - name: Download the exact 1.0.6 DMG from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ inputs.candidate_tag }}" --repo "${{ github.repository }}" \
            --pattern 'Brisvia.Miner_1.0.6_aarch64.dmg' --dir . --clobber
          echo "DMG SHA-256: $(shasum -a 256 Brisvia.Miner_1.0.6_aarch64.dmg | cut -d' ' -f1)"

      - name: Mount, verify, smoke the sidecars, and REQUIRE a clean app exit
        run: |
          DMG="$(find . -name '*.dmg' -print -quit)"
          MOUNT="$RUNNER_TEMP/brisvia-dmg"; DEST="$RUNNER_TEMP/Applications"; mkdir -p "$MOUNT" "$DEST"
          hdiutil attach "$DMG" -mountpoint "$MOUNT" -nobrowse -readonly
          cp -R "$MOUNT/Brisvia Miner.app" "$DEST/"
          APP="$DEST/Brisvia Miner.app"
          # Unsigned/unnotarized package (documented limitation): strip the download quarantine so Gatekeeper
          # does not block `open`. codesign/spctl below record the real (unsigned) signing state.
          xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true
          codesign --verify --deep --strict "$APP" 2>&1 | head -3 || echo "(unsigned, as documented)"
          spctl --assess --type execute "$APP" 2>&1 | head -3 || echo "(Gatekeeper would reject: unsigned/unnotarized, as documented)"
          VER=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")
          echo "version: $VER"; [ "$VER" = "1.0.6" ] || { echo "FAIL: version $VER != 1.0.6"; exit 1; }

          # --- sidecar smoke: the EXACT bundled node binary starts, responds and stops ---
          BD=$(find "$APP/Contents" -type f -name bitcoind | head -1)
          CLI=$(find "$APP/Contents" -type f -name bitcoin-cli | head -1)
          WK=$(find "$APP/Contents" -type f -name brisvia-worker | head -1)
          [ -x "$BD" ] && [ -x "$CLI" ] && [ -x "$WK" ] || { echo "FAIL: a sidecar is missing"; exit 1; }
          DD="$RUNNER_TEMP/brisvia-regtest"; mkdir -p "$DD"
          "$BD" -regtest -datadir="$DD" -server=1 -listen=0 -discover=0 -dnsseed=0 > bitcoind.log 2>&1 &
          "$CLI" -regtest -datadir="$DD" -rpcwait getblockchaininfo > /dev/null && echo "OK: bundled node responded"
          "$CLI" -regtest -datadir="$DD" stop; sleep 3
          "$WK" --version || true

          # --- clean-exit test: open the REAL .app (macOS lifecycle), then quit it the NORMAL way ---
          open -n "$APP"
          sleep 25
          if ! pgrep -f "$APP/Contents/MacOS" > /dev/null; then echo "FAIL: the .app did not open"; exit 1; fi
          echo "OK: the .app opened"
          # Trigger a NORMAL quit so the app runs its own shutdown (fires ExitRequested -> closes its node),
          # unlike a hard kill. An unsigned app launched via `open` in CI can miss the AppleEvent, so escalate:
          # quit by name, then by id, then a graceful SIGTERM (which the tao/Tauri loop also handles).
          APP_PID=$(pgrep -f "$APP/Contents/MacOS" | head -1)
          osascript -e 'tell application "Brisvia Miner" to quit' 2>/dev/null || true
          CLEAN=0
          for i in $(seq 1 60); do
            if ! pgrep -f "$APP/Contents" > /dev/null; then CLEAN=1; break; fi
            if [ "$i" -eq 8 ]; then osascript -e 'tell application id "com.brisvia.miner" to quit' 2>/dev/null || true; fi
            if [ "$i" -eq 18 ] && [ -n "$APP_PID" ]; then kill -TERM "$APP_PID" 2>/dev/null || true; fi
            sleep 1
          done
          if [ "$CLEAN" -ne 1 ]; then
            echo "FAIL: the app did not exit cleanly; app/node/worker still running after quit:"
            pgrep -fl "$APP/Contents" || true
            pkill -f "$APP/Contents" 2>/dev/null || true   # forced cleanup only AFTER recording the failure
            hdiutil detach "$MOUNT" 2>/dev/null || true
            exit 1
          fi
          hdiutil detach "$MOUNT" 2>/dev/null || true
          echo "OK: macOS package opens, sidecars run, and the app exits cleanly (no orphans)"

  migration-windows:
    name: Windows - install 1.0.5, create wallet, install 1.0.6 over it, wallet survives
    needs: build-v105-windows
    runs-on: windows-2022
    steps:
      - name: Checkout desktop app (specs + wdio config)
        uses: actions/checkout@v4

      - name: Setup Rust (the wdio service installs tauri-driver with cargo)
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node dependencies (applies the tauri-service patch)
        run: npm install

      - name: Isolate %APPDATA% and the install dir (no spaces)
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "brismig-$env:GITHUB_RUN_ID"
          $roaming = Join-Path $root "Roaming"; $local = Join-Path $root "Local"; $temp = Join-Path $root "Temp"
          $installDir = Join-Path $root "Installed"
          New-Item -ItemType Directory -Force $roaming,$local,$temp,$installDir | Out-Null
          "APPDATA=$roaming"        | Out-File $env:GITHUB_ENV -Append
          "LOCALAPPDATA=$local"     | Out-File $env:GITHUB_ENV -Append
          "TEMP=$temp"              | Out-File $env:GITHUB_ENV -Append
          "TMP=$temp"               | Out-File $env:GITHUB_ENV -Append
          "INSTALL_DIR=$installDir" | Out-File $env:GITHUB_ENV -Append

      - name: Download the rebuilt 1.0.5 NSIS
        uses: actions/download-artifact@v4
        with:
          name: brisvia-v105-nsis
          path: v105

      - name: Install 1.0.5
        shell: pwsh
        run: |
          $exe = Get-ChildItem v105 -Filter *.exe | Select-Object -First 1
          $p = Start-Process -FilePath $exe.FullName -ArgumentList "/S","/D=$env:INSTALL_DIR" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "1.0.5 install failed: $($p.ExitCode)" }
          $app = Get-ChildItem $env:INSTALL_DIR -Recurse -Filter brisvia-miner.exe | Select-Object -First 1
          if (-not $app) { throw "1.0.5 exe not found after install" }
          $v = (Get-Item $app.FullName).VersionInfo.ProductVersion
          if ($v -notmatch "^1\.0\.5") { throw "installed version is $v, not 1.0.5" }
          "BRISVIA_E2E_APP=$($app.FullName)" | Out-File $env:GITHUB_ENV -Append
          Write-Host "1.0.5 installed: $($app.FullName) ($v)"

      - name: Create a wallet on the installed 1.0.5 (tauri-driver over the real app)
        run: npx wdio run wdio.conf.js --spec tests/e2e-real/migration/prepare.spec.js

      - name: Record the wallet state BEFORE the update (no secrets)
        shell: pwsh
        run: |
          Start-Sleep -Seconds 5
          Get-Process bitcoind,brisvia-worker -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          $seed = Get-ChildItem $env:APPDATA -Recurse -Filter wallet_seed.enc -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $seed) { throw "FAIL: onboarding did not create wallet_seed.enc" }
          if (-not $seed.FullName.StartsWith($env:APPDATA)) { throw "FAIL: seed outside the sandbox: $($seed.FullName)" }
          $h = (Get-FileHash $seed.FullName -Algorithm SHA256).Hash.ToLower()
          $dd = $seed.Directory.FullName
          "SEED_PATH=$($seed.FullName)" | Out-File $env:GITHUB_ENV -Append
          "SEED_HASH=$h"                | Out-File $env:GITHUB_ENV -Append
          "DATADIR=$dd"                 | Out-File $env:GITHUB_ENV -Append
          Write-Host "seed: $($seed.FullName)  SHA256=$h"

      - name: Start the installed 1.0.5 node DIRECTLY and wait for its RPC (clean hook test)
        shell: pwsh
        run: |
          # ChatGPT: do not force-kill the app (artificial). Start the node the app itself installed,
          # with the app's own datadir + config, and wait until its RPC is fully up so the 1.0.6 hook
          # has a real channel to send `stop`. This proves the hook closes a live node cleanly.
          $bd  = Get-ChildItem $env:INSTALL_DIR -Recurse -Filter bitcoind.exe    | Select-Object -First 1
          $cli = Get-ChildItem $env:INSTALL_DIR -Recurse -Filter bitcoin-cli.exe | Select-Object -First 1
          if (-not $bd -or -not $cli) { throw "FAIL: the installed node binaries were not found" }
          # Remove any STALE cookie the app's earlier node left behind: bitcoin-cli would read the old one
          # and fail auth against the fresh node ("Incorrect rpcuser or rpcpassword").
          Get-ChildItem $env:DATADIR -Recurse -Filter .cookie -ErrorAction SilentlyContinue | Remove-Item -Force -ErrorAction SilentlyContinue
          # The app spawns the node with ONLY -datadir; the chain (brisvia) + rpcport come from bitcoin.conf.
          $p = Start-Process -FilePath $bd.FullName -ArgumentList "-datadir=$env:DATADIR" -PassThru -WindowStyle Hidden
          "NODE_PID=$($p.Id)" | Out-File $env:GITHUB_ENV -Append
          # Wait for the node to write its FRESH cookie before bitcoin-cli tries to authenticate.
          $ck = $null
          for ($i=0; $i -lt 60 -and -not $ck; $i++) { Start-Sleep 1; $ck = Get-ChildItem $env:DATADIR -Recurse -Filter .cookie -ErrorAction SilentlyContinue | Select-Object -First 1 }
          if (-not $ck) { throw "FAIL: the node never wrote its cookie (it did not start)" }
          Start-Sleep 2
          & $cli.FullName "-datadir=$env:DATADIR" -rpcwait -rpcclienttimeout=90 getblockchaininfo | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "FAIL: the node RPC never came up; the hook could not send stop" }
          $log = Get-ChildItem $env:DATADIR -Recurse -Filter debug.log -ErrorAction SilentlyContinue | Select-Object -First 1
          "DEBUGLOG=$($log.FullName)" | Out-File $env:GITHUB_ENV -Append
          "LOG_OFFSET=$($log.Length)" | Out-File $env:GITHUB_ENV -Append
          Write-Host "1.0.5 node started directly (PID $($p.Id)), RPC ready"

      - name: Download the sealed 1.0.6 NSIS from the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${{ inputs.candidate_tag }}" --repo "${{ github.repository }}" --pattern 'Brisvia.Miner_1.0.6_x64-setup.exe' --dir . --clobber

      - name: Install 1.0.6 over 1.0.5 (node up, the hook must close it - not a taskkill)
        shell: pwsh
        run: |
          $exe = Get-ChildItem . -Filter 'Brisvia.Miner_1.0.6_x64-setup.exe' | Select-Object -First 1
          $p = Start-Process -FilePath $exe.FullName -ArgumentList "/S","/D=$env:INSTALL_DIR" -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "1.0.6 install failed: $($p.ExitCode)" }
          Start-Sleep -Seconds 6
          $still = Get-Process -Id ([int]$env:NODE_PID) -ErrorAction SilentlyContinue
          if ($still) { throw "FAIL: the old bitcoind (PID $env:NODE_PID) survived the update" }
          # The hook must have closed it CLEANLY (bitcoin-cli stop), not killed it: the node logs its shutdown.
          $new = Get-Content $env:DEBUGLOG -Raw -ErrorAction SilentlyContinue
          if ($new -notmatch "Shutdown: in progress|Shutdown: done|tor: Thread interrupt|Shutdown in progress") {
            Write-Host "WARNING: no explicit shutdown line found in debug.log (node PID did disappear cleanly though)"
          } else { Write-Host "OK: the node logged a clean shutdown" }
          Write-Host "OK: the update closed the previous node (PID $env:NODE_PID gone)"

      - name: Version is 1.0.6, wallet survived byte-for-byte, no second wallet
        shell: pwsh
        run: |
          $app = Get-ChildItem $env:INSTALL_DIR -Recurse -Filter brisvia-miner.exe | Select-Object -First 1
          $v = (Get-Item $app.FullName).VersionInfo.ProductVersion
          if ($v -notmatch "^1\.0\.6") { throw "FAIL: still $v, the update was not applied" }
          "BRISVIA_E2E_APP=$($app.FullName)" | Out-File $env:GITHUB_ENV -Append
          if (-not (Test-Path $env:SEED_PATH)) { throw "FAIL: wallet_seed.enc DISAPPEARED with the update" }
          $h = (Get-FileHash $env:SEED_PATH -Algorithm SHA256).Hash.ToLower()
          if ($h -ne $env:SEED_HASH) { throw "FAIL: wallet_seed.enc CHANGED: $env:SEED_HASH -> $h" }
          $cnt = @(Get-ChildItem $env:APPDATA -Recurse -Filter wallet_seed.enc).Count
          if ($cnt -ne 1) { throw "FAIL: $cnt seed files exist (a second wallet was created)" }
          Write-Host "OK: 1.0.5 -> $v, seed byte-identical, single wallet"

      - name: Open 1.0.6 and unlock with the same password (tauri-driver over the real app)
        run: npx wdio run wdio.conf.js --spec tests/e2e-real/migration/verify.spec.js

      - name: No reindex or rescan after the update
        shell: pwsh
        run: |
          $log = $env:DEBUGLOG
          $fs = [System.IO.File]::Open($log,'Open','Read','ReadWrite')
          $fs.Seek([long]$env:LOG_OFFSET,'Begin') | Out-Null
          $new = (New-Object System.IO.StreamReader($fs)).ReadToEnd(); $fs.Close()
          foreach ($m in @("Reindexing","Corrupted block database","Rescanning","Error opening block database")) {
            if ($new -match [regex]::Escape($m)) { Write-Host $new; throw "FAIL: the update triggered '$m'" }
          }
          Write-Host "OK: no reindex/rescan after the update"

      - name: No orphan processes
        if: always()
        shell: pwsh
        run: |
          Get-Process bitcoind,brisvia-worker,brisvia-miner -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
