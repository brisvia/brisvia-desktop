name: Build Linux

# Builds the whole app for Linux (x86-64) on GitHub's free Ubuntu runners:
# RandomX -> bitcoind node -> Rust miner -> Tauri app (.AppImage + .deb) -> attach to the release.
# The .AppImage is portable and runs on most modern distros. Triggered manually from the Actions tab.
on:
  workflow_dispatch:

jobs:
  linux-x86_64:
    runs-on: ubuntu-22.04 # glibc 2.35 + webkit2gtk-4.1; AppImage runs on Ubuntu 22.04+/Debian 12+ and newer
    permissions:
      contents: write # needed to attach the artifacts to the release
    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4

      # Version guard (real bug: tauri.conf said 1.0.2 and Cargo.toml 1.0.0 -> the app showed the old one).
      # If they do not match, the build FAILS here and nothing out of sync gets published.
      - name: Guard - tauri.conf.json and Cargo.toml versions must match
        shell: bash
        env:
          GITHUB_WORKFLOW_FILE: .github/workflows/build-linux.yml
        run: |
          TC=$(grep -oE '"version": "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/tauri.conf.json | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          CG=$(grep -oE '^version = "[0-9]+\.[0-9]+\.[0-9]+"' src-tauri/Cargo.toml | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          # The tag the release attaches to has to be the SAME number: otherwise the updater
          # offers people a version that does not match the one the installer carries.
          TAG=$(grep -oE 'tag_name: v[0-9]+\.[0-9]+\.[0-9]+' "$GITHUB_WORKFLOW_FILE" | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "tauri.conf.json = $TC | Cargo.toml = $CG | release tag = $TAG"
          if [ "$TC" != "$CG" ]; then echo "FAIL: versions out of sync ($TC vs $CG)"; exit 1; fi
          if [ "$TAG" != "$TC" ]; then echo "FAIL: the release tag (v$TAG) does not match the version ($TC)"; exit 1; fi
          echo "OK: version and tag in sync ($TC)"

      # PRODUCT guards (not logic). They exist because of real bugs the owner found in 2 minutes and
      # a 20-agent audit missed: a Spanish text with the language set to English, and a raw node error
      # on screen. They look at the product as people see it, not at the code in isolation.
      - name: Guard - texts (complete languages, no mixes, no hardcoded text in the HTML)
        shell: bash
        run: python tools/check_textos.py

      - name: Guard - errors (every program error arrives translated in ES and EN)
        shell: bash
        run: python tools/check_error_contract.py

      - name: Checkout core (with the RandomX submodule)
        uses: actions/checkout@v4
        with:
          repository: brisvia/brisvia
          # Pin the node source to the commit that carries the mainnet port move (P2P 9342, RPC 9338). The core
          # `main` branch still has Litecoin's old 9333/9332 (the fix lives on mainnet-ports-9342, one commit
          # ahead of main, same genesis/consensus). Without this pin the packaged node shipped on 9333 — caught
          # by the Linux ports guard. TODO: merge mainnet-ports-9342 into core main, then drop this pin.
          ref: 69c48b2dfcf20fba70f6b5aef6958786e61ab7ed
          submodules: recursive
          path: core

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # bitcoind's deps (boost/libevent/sqlite) are NOT installed on purpose: `depends` builds them,
          # static. Having them on the system is exactly what made cmake link the node against the
          # runner's libs and die on the user's machine with
          # "libevent_extra-2.1.so.7 => not found". If they are not installed, they cannot sneak in.
          # What follows is only for compiling, for Tauri (webkit2gtk 4.1) and for the AppImage (patchelf).
          sudo apt-get install -y \
            cmake build-essential pkg-config curl \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf

      - name: Build RandomX (static lib, portable)
        # No -DARCH=native on purpose: the CI CPU differs from users', a native build could use
        # instructions (AVX2/...) missing on older CPUs. The portable build keeps runtime CPU detection.
        run: |
          cmake -S core/src/randomx -B core/src/randomx/build -DCMAKE_BUILD_TYPE=Release
          cmake --build core/src/randomx/build -j3

      - name: Mark job start (used to prove the sidecar was built by THIS run)
        run: |
          JOB_START_FILE=$(mktemp)
          echo "JOB_START_FILE=$JOB_START_FILE" >> "$GITHUB_ENV"
          echo "job start marker (UTC): $(date -u)"

      - name: Build bitcoind and bitcoin-cli
        run: |
          cd core
          # The dependencies are built with Core's `depends` system, which exists precisely for this:
          # its libevent recipe forces EVENT__LIBRARY_TYPE=STATIC. Before, they were compiled against the
          # runner's libs, so the node came out tied to packages the user's machine does not have and died with
          # "libevent_extra-2.1.so.7 => not found". A node that does not start is an app that cannot mine.
          # Found by running the node extracted from the already-installed .deb, not by reading the code.
          make -C depends -j"$(nproc)" HOST=x86_64-pc-linux-gnu NO_QT=1 NO_ZMQ=1 NO_IPC=1
          # -static-libstdc++ -static-libgcc: the C++ library goes INSIDE the binary.
          #
          # `depends` fixes the third-party dependencies (libevent, boost, sqlite) but NOT these two, which
          # the compiler adds. The node came out asking for libstdc++.so.6 with GLIBCXX_3.4.30 -- that is the
          # GCC 12 version. Core's own allowed-libraries list (contrib/guix/symbol-check.py)
          # does NOT include libstdc++.so.6, precisely for this: Core puts it inside in all its releases.
          #
          # Measured on the bitcoind taken from the rc4 .deb, not assumed:
          #     libstdc++.so.6, libm.so.6, libgcc_s.so.1, libc.so.6, ld-linux-x86-64.so.2
          #     GLIBCXX -> 3.4.30 | CXXABI -> 1.3.13 | GCC -> 7.0.0 | GLIBC -> 2.34
          # This leaves only libm, libc and the loader, and the GLIBCXX/CXXABI demands disappear.
          # What remains as the floor is GLIBC 2.34, which is declared and tested on clean machines.
          cmake -B build --toolchain depends/x86_64-pc-linux-gnu/toolchain.cmake -DBUILD_SHARED_LIBS=OFF \
            -DENABLE_IPC=OFF -DBUILD_TESTS=OFF -DBUILD_GUI=OFF -DWITH_ZMQ=OFF -DBUILD_BENCH=OFF \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" \
            -DBRISVIA_RANDOMX_LIB="$PWD/src/randomx/build/librandomx.a" \
            -DBRISVIA_RANDOMX_INCLUDE="$PWD/src/randomx/src"
          cmake --build build --target bitcoind bitcoin-cli -j3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build the miner (mine-once)
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          cargo build --release --manifest-path crates/brisvia-randomx/Cargo.toml --bin mine-once

      - name: Stage binaries (no .exe on Linux) and point the config at them
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          mkdir -p src-tauri/binaries
          rm -f src-tauri/binaries/*   # nothing pre-existing survives
          cp core/build/bin/bitcoind src-tauri/binaries/bitcoind
          cp core/build/bin/bitcoin-cli src-tauri/binaries/bitcoin-cli
          cp crates/brisvia-randomx/target/release/mine-once src-tauri/binaries/brisvia-worker || \
            cp target/release/mine-once src-tauri/binaries/brisvia-worker
          chmod +x src-tauri/binaries/*
          # PROVENANCE GUARD. Nothing pre-existing may survive into the package, and the node must have been
          # produced by THIS run. A stale node is not a loud failure: it is a DIFFERENT NETWORK that only
          # shows up on launch day. (Real case, 2026-07-15: a 9-July bitcoind carrying the pre-recalibration
          # genesis 7f1cf9cf was found sitting in a working tree.)
          for f in core/build/bin/bitcoind core/build/bin/bitcoin-cli; do
            [ -f "$f" ] || { echo "FAIL: $f does not exist: this job did not compile it"; exit 1; }
            if [ -n "$JOB_START_FILE" ] && [ "$f" -ot "$JOB_START_FILE" ]; then
              echo "FAIL: $f is older than the job start: this build did not produce it"; exit 1
            fi
          done
          SIDECAR_SHA256=$(sha256sum src-tauri/binaries/bitcoind | cut -d' ' -f1)
          echo "SIDECAR_SHA256=$SIDECAR_SHA256" >> "$GITHUB_ENV"
          echo "sidecar bitcoind SHA-256: $SIDECAR_SHA256"

          # Ask the node ITSELF which network it is, instead of trusting the source tree. This is the check
          # that would have caught a stale sidecar, and it costs 15 seconds.
          DD=$(mktemp -d)
          {
            echo "server=1"
            echo "rpcuser=t"
            echo "rpcpassword=t"
            echo "listen=0"
            echo "[brisvia]"
            echo "rpcport=28461"
          } > "$DD/bitcoin.conf"
          src-tauri/binaries/bitcoind -datadir="$DD" -chain=brisvia &
          sleep 15
          CLI="src-tauri/binaries/bitcoin-cli -datadir=$DD -chain=brisvia -rpcport=28461 -rpcuser=t -rpcpassword=t"
          GEN=$($CLI getblockhash 0 2>&1 | tr -d '[:space:]')
          $CLI stop >/dev/null 2>&1 || true
          sleep 3
          echo "genesis of the node about to be packaged: $GEN"
          if [ "$GEN" != "aa6bc268339aa9f4f2e39ae33aca7b7e48e395033d08d37c08f828890af7baf7" ]; then
            echo "FAIL: the node has genesis $GEN, not the real Brisvia network's"; exit 1
          fi
          echo "OK: the packaged node is the real Brisvia network (genesis aa6bc268...)"
          python3 - <<'PY'
          import json, os
          p = "src-tauri/tauri.conf.json"
          d = json.load(open(p))
          d["bundle"]["resources"] = ["binaries/bitcoind", "binaries/bitcoin-cli", "binaries/brisvia-worker"]
          # nsis is Windows-only; on Linux build AppImage (portable) + deb.
          # Sign only if the signing key secret is present (yields the .AppImage.sig updater artifact).
          signing = bool(os.environ.get("TAURI_SIGNING_PRIVATE_KEY"))
          d["bundle"]["createUpdaterArtifacts"] = signing
          d["bundle"]["targets"] = ["appimage", "deb"]
          json.dump(d, open(p, "w"), indent=2)
          PY

      # After staging the sidecar binaries, so the Tauri build script finds the resources it validates.
      - name: Rust tests on this platform (golden vector + wallet battery + crate) - MAINNET
        env:
          BRISVIA_WALLET_CASES: "5000"
        run: |
          export RANDOMX_LIB_DIR="$PWD/core/src/randomx/build"
          cargo test --manifest-path crates/brisvia-randomx/Cargo.toml -- --skip vector_fast
          cargo test --manifest-path src-tauri/Cargo.toml --features mainnet --lib wallet_key_tests -- --nocapture

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Guard - the node must open on a user's machine, not just on this one
        run: |
          # The verifier reads the binary's STRUCTURE with lief, not ldd's text output.
          # The previous guard was bash with ldd + sed and gave two false positives in a row, both from
          # guessing instead of reading. Besides, ldd does not show what really decides whether the binary
          # opens: the symbol version it demands. See tools/check_portable.py.
          python3 -m pip install --quiet lief
          python3 tools/check_portable.py --self-test
          python3 tools/check_portable.py src-tauri/binaries/bitcoind src-tauri/binaries/bitcoin-cli

      - name: Build the Tauri app (.AppImage + .deb + signed updater artifact)
        run: npm run tauri build -- --features mainnet
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      - name: Smoke test the compiled binaries
        run: |
          ./src-tauri/binaries/bitcoind -version | head -1 || echo "bitcoind version check failed"
          file ./src-tauri/binaries/brisvia-worker || true

      - name: Stage the .AppImage with a fixed (versionless) name for a permanent download link
        # Keeps releases/latest/download/Brisvia-Miner-Linux.AppImage working across every version.
        run: cp src-tauri/target/release/bundle/appimage/*.AppImage Brisvia-Miner-Linux.AppImage

      - name: Guard - the app binary must target MAINNET (coin 9339)
        run: |
          BIN=$(find src-tauri/target/release -maxdepth 1 -name brisvia-miner -type f | head -1)
          grep -a -q '9339h' "$BIN" || { echo 'FAIL: binary is NOT mainnet (missing 9339h). Compile with --features mainnet.'; exit 1; }
          echo 'OK: mainnet binary (9339h)'

      - name: Attach the .AppImage, .deb and the signed updater artifact to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.8
          draft: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb
            Brisvia-Miner-Linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
